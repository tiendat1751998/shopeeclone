global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]
    metrics_path: /metrics

  - job_name: "identity-auth"
    static_configs:
      - targets: ["identity-auth:8080"]
    metrics_path: /actuator/prometheus

  - job_name: "catalog-product"
    static_configs:
      - targets: ["catalog-product:8080"]
    metrics_path: /metrics

  - job_name: "shopping-cart"
    static_configs:
      - targets: ["shopping-cart:8080"]
    metrics_path: /metrics

  - job_name: "inventory-flashsale"
    static_configs:
      - targets: ["inventory-flashsale:8080"]
    metrics_path: /metrics

  - job_name: "order-processing"
    static_configs:
      - targets: ["order-processing:8080"]
    metrics_path: /actuator/prometheus

  - job_name: "payment-ledger"
    static_configs:
      - targets: ["payment-ledger:8080"]
    metrics_path: /actuator/prometheus

  - job_name: "search-indexing"
    static_configs:
      - targets: ["search-indexing:8080"]
    metrics_path: /metrics

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "postgres-exporter"
    static_configs:
      - targets: ["postgres-exporter:9187"]
