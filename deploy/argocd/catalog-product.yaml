apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: catalog-product
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: shopee
  source:
    repoURL: https://github.com/shopee-clone/shopee-clone
    targetRevision: main
    path: deploy/helm/charts/catalog-product
    helm:
      valueFiles:
        - values.yaml
        - values/production.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: shopee
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - Validate=true
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
