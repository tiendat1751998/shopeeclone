apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: tiki-secret-store
  namespace: tiki
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-southeast-1
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: aws-secrets
            key: access-key
          secretAccessKeySecretRef:
            name: aws-secrets
            key: secret-access-key
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: tiki-db-credentials
  namespace: tiki
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: tiki-secret-store
    kind: SecretStore
  target:
    name: db-credentials
  data:
    - secretKey: username
      remoteRef:
        key: /tiki/production/database
        property: username
    - secretKey: password
      remoteRef:
        key: /tiki/production/database
        property: password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: tiki-redis-credentials
  namespace: tiki
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: tiki-secret-store
    kind: SecretStore
  target:
    name: redis-credentials
  data:
    - secretKey: password
      remoteRef:
        key: /tiki/production/redis
        property: password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: tiki-kafka-credentials
  namespace: tiki
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: tiki-secret-store
    kind: SecretStore
  target:
    name: kafka-credentials
  data:
    - secretKey: username
      remoteRef:
        key: /tiki/production/kafka
        property: username
    - secretKey: password
      remoteRef:
        key: /tiki/production/kafka
        property: password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: tiki-jwt-credentials
  namespace: tiki
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: tiki-secret-store
    kind: SecretStore
  target:
    name: jwt-credentials
  data:
    - secretKey: jwt-secret
      remoteRef:
        key: /tiki/production/jwt
        property: secret
    - secretKey: jwt-public-key
      remoteRef:
        key: /tiki/production/jwt
        property: public-key
