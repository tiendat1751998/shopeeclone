apiVersion: v1
kind: ConfigMap
metadata:
  name: pod-security-standards
  namespace: shopee-infra
data:
  pod-security-policy: |
    runAsUser:
      rule: MustRunAsNonRoot
    runAsGroup:
      rule: MustRunAs
      ranges:
        - min: 1000
          max: 65535
    seLinux:
      rule: RunAsAny
    supplementalGroups:
      rule: MustRunAs
      ranges:
        - min: 1000
          max: 65535
    fsGroup:
      rule: MustRunAs
      ranges:
        - min: 1000
          max: 65535
    seccomp:
      profiles:
        - runtime/default
    allowPrivilegeEscalation: false
    capabilities:
      requiredDrop:
        - ALL
    readOnlyRootFilesystem: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: container-security-context
  namespace: shopee-infra
data:
  security-context: |
    securityContext:
      runAsNonRoot: true
      runAsUser: 1001
      runAsGroup: 1001
      fsGroup: 1001
      seccompProfile:
        type: RuntimeDefault
      capabilities:
        drop: ["ALL"]
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
