apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-ingress-config
  namespace: tiki-ingress
data:
  # Body size
  proxy-body-size: "10m"
  
  # Timeouts
  proxy-read-timeout: "60"
  proxy-send-timeout: "60"
  proxy-connect-timeout: "10"
  upstream-keepalive-timeout: "60"
  
  # Headers
  use-forwarded-headers: "true"
  forwarded-for-header: "X-Forwarded-For"
  compute-full-forwarded-for: "true"
  proxy-real-ip-cidr: "0.0.0.0/0"
  use-proxy-protocol: "false"
  
  # TLS
  ssl-protocols: "TLSv1.2 TLSv1.3"
  ssl-ciphers: "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384"
  ssl-session-cache: "true"
  ssl-session-cache-size: "10m"
  ssl-session-timeout: "10m"
  ssl-buffer-size: "4k"
  ssl-early-data: "true"
  enable-ocsp: "true"
  
  # Rate limiting
  limit-rate-after: "10m"
  limit-rate: "100k"
  limit-connections: "100"
  limit-rpm: "1000"
  limit-rps: "200"
  
  # Gzip
  gzip-level: "6"
  gzip-types: "application/json application/javascript text/css text/plain text/xml application/xml text/html image/svg+xml"
  gzip-min-length: "1000"
  gzip-disable: "msie6"
  
  # Security headers (applied via configuration-snippet)
  server-tokens: "false"
  hide-headers: "Server,X-Powered-By,X-AspNet-Version"
  
  # CORS
  enable-cors: "true"
  cors-allow-origin: "https://tiki-clone.com"
  cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
  cors-allow-headers: "DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization,Idempotency-Key"
  cors-max-age: "86400"
  
  # Logging
  log-format-escape-json: "true"
  log-format-upstream: '{"time": "$time_iso8601", "remote_addr": "$remote_addr", "x-forward-for": "$http_x_forwarded_for", "request_id": "$req_id", "request_method": "$request_method", "request_uri": "$request_uri", "status": $status, "body_bytes_sent": $body_bytes_sent, "request_time": $request_time, "http_referrer": "$http_referer", "http_user_agent": "$http_user_agent", "upstream_addr": "$upstream_addr", "upstream_status": $upstream_status, "upstream_response_time": $upstream_response_time, "trace_id": "$req_trace_id"}'
  
  # Error handling
  custom-http-errors: "404,503,502,504"
  error-log-level: "warn"
