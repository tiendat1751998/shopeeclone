apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: shopee-observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-exporter
  template:
    metadata:
      labels:
        app: postgres-exporter
    spec:
      containers:
        - name: exporter
          image: quay.io/prometheuscommunity/postgres-exporter:latest
          env:
            - name: DATA_SOURCE_NAME
              value: "postgresql://$(DB_USER):$(DB_PASSWORD)@postgres.shopee-infra:5432/shopee?sslmode=disable"
          envFrom:
            - secretRef:
                name: db-credentials
          ports:
            - containerPort: 9187
              name: metrics
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
  namespace: shopee-observability
  labels:
    app: postgres-exporter
spec:
  ports:
    - name: metrics
      port: 9187
      targetPort: 9187
  selector:
    app: postgres-exporter
