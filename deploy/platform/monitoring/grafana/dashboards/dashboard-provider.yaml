apiVersion: 1

providers:
  - name: 'tiki-dashboards'
    orgId: 1
    folder: 'Tiki Platform'
    folderUid: 'tiki'
    type: file
    disableDeletion: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards/tiki
      foldersFromFilesStructure: false
