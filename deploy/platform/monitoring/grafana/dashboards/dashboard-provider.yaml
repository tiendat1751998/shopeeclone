apiVersion: 1

providers:
  - name: 'shopee-dashboards'
    orgId: 1
    folder: 'Shopee Platform'
    folderUid: 'shopee'
    type: file
    disableDeletion: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards/shopee
      foldersFromFilesStructure: false
