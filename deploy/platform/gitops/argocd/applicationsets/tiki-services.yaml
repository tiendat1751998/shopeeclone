apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tiki-services
  namespace: tiki-gitops
spec:
  generators:
    - list:
        elements:
          - name: auth
            path: services/auth/charts
          - name: cart
            path: services/cart/charts
          - name: gateway
            path: services/gateway/charts
          - name: inventory
            path: services/inventory/charts
          - name: order
            path: services/order/charts
          - name: payment
            path: services/payment/charts
          - name: product-catalog
            path: services/product-catalog/charts
          - name: product
            path: services/product/charts
          - name: promotion
            path: services/promotion/charts
          - name: shipment
            path: services/shipment/charts
          - name: checkout
            path: services/checkout/charts
  template:
    metadata:
      name: "{{name}}"
      labels:
        app: "{{name}}"
        tier: services
    spec:
      project: tiki-services
      source:
        repoURL: https://github.com/tiki-clone/tiki-clone
        targetRevision: main
        path: "{{path}}"
        helm:
          valueFiles:
            - values.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: tiki
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
          - CreateNamespace=true
          - PruneLast=true
          - ApplyOutOfSyncOnly=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tiki-platforms
  namespace: tiki-gitops
spec:
  generators:
    - list:
        elements:
          - name: api-gateway
            path: platforms/api-gateway/charts
          - name: analytics
            path: platforms/analytics/charts
          - name: billing
            path: platforms/billing/charts
          - name: fraud
            path: platforms/fraud/charts
          - name: notification
            path: platforms/notification/charts
          - name: recommendation
            path: platforms/recommendation/charts
          - name: search
            path: platforms/search/charts
          - name: search-indexing
            path: platforms/search-indexing/charts
          - name: service-mesh
            path: platforms/service-mesh/charts
          - name: sre
            path: platforms/sre/charts
          - name: user-behavior
            path: platforms/user-behavior/charts
          - name: advertising
            path: platforms/advertising/charts
  template:
    metadata:
      name: "{{name}}"
      labels:
        app: "{{name}}"
        tier: platforms
    spec:
      project: tiki-platforms
      source:
        repoURL: https://github.com/tiki-clone/tiki-clone
        targetRevision: main
        path: "{{path}}"
        helm:
          valueFiles:
            - values.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: tiki
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ApplyOutOfSyncOnly=true
        retry:
          limit: 3
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 2m
