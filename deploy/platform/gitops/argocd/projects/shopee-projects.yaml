apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: shopee-services
  namespace: shopee-gitops
spec:
  description: Shopee Core Services
  sourceRepos:
    - https://github.com/shopee-clone/shopee-clone
  destinations:
    - namespace: shopee
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
  orphanedResources:
    warn: true
  syncWindows:
    - kind: allow
      schedule: "* * * * *"
      duration: 1h
      applications:
        - "*-prod"
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: shopee-platforms
  namespace: shopee-gitops
spec:
  description: Shopee Platform Services
  sourceRepos:
    - https://github.com/shopee-clone/shopee-clone
  destinations:
    - namespace: shopee
      server: https://kubernetes.default.svc
    - namespace: shopee-infra
      server: https://kubernetes.default.svc
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
  syncWindows:
    - kind: allow
      schedule: "* * * * *"
      duration: 1h
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: shopee-infrastructure
  namespace: shopee-gitops
spec:
  description: Shopee Infrastructure Components
  sourceRepos:
    - https://github.com/shopee-clone/shopee-clone
  destinations:
    - namespace: shopee-infra
      server: https://kubernetes.default.svc
    - namespace: shopee-observability
      server: https://kubernetes.default.svc
    - namespace: shopee-ingress
      server: https://kubernetes.default.svc
    - namespace: shopee-gitops
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
