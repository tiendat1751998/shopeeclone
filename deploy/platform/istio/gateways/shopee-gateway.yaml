apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: shopee-gateway
  namespace: shopee
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "api.shopee-clone.com"
      tls:
        httpsRedirect: true
    - port:
        number: 443
        name: https
        protocol: HTTPS
      hosts:
        - "api.shopee-clone.com"
      tls:
        mode: SIMPLE
        credentialName: shopee-tls-cert
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: shopee-routing
  namespace: shopee
spec:
  hosts:
    - "api.shopee-clone.com"
  gateways:
    - shopee-gateway
  http:
    - match:
        - uri:
            prefix: /api/v1/auth
      route:
        - destination:
            host: auth.shopee.svc.cluster.local
            port:
              number: 8080
      timeout: 10s
      retries:
        attempts: 3
        perTryTimeout: 3s
    - match:
        - uri:
            prefix: /api/v1/products
      route:
        - destination:
            host: product.shopee.svc.cluster.local
            port:
              number: 8080
      timeout: 30s
    - match:
        - uri:
            prefix: /api/v1/inventory
      route:
        - destination:
            host: inventory.shopee.svc.cluster.local
            port:
              number: 8080
      timeout: 5s
    - match:
        - uri:
            prefix: /api/v1/cart
      route:
        - destination:
            host: cart.shopee.svc.cluster.local
            port:
              number: 8080
      timeout: 10s
    - match:
        - uri:
            prefix: /api/v1/checkout
      route:
        - destination:
            host: checkout.shopee.svc.cluster.local
            port:
              number: 8080
      timeout: 30s
    - match:
        - uri:
            prefix: /api/v1/orders
      route:
        - destination:
            host: order.shopee.svc.cluster.local
            port:
              number: 8080
      timeout: 10s
    - match:
        - uri:
            prefix: /api/v1/payments
      route:
        - destination:
            host: payment.shopee.svc.cluster.local
            port:
              number: 8080
      timeout: 30s
    - match:
        - uri:
            prefix: /api/v1/promotions
      route:
        - destination:
            host: promotion.shopee.svc.cluster.local
            port:
              number: 8080
      timeout: 10s
    - match:
        - uri:
            prefix: /api/v1/shipments
      route:
        - destination:
            host: shipment.shopee.svc.cluster.local
            port:
              number: 8080
      timeout: 10s
    - match:
        - uri:
            prefix: /api/v1/catalog
      route:
        - destination:
            host: product-catalog.shopee.svc.cluster.local
            port:
              number: 8080
      timeout: 30s
    - match:
        - uri:
            prefix: /api/v1/search
      route:
        - destination:
            host: search.shopee.svc.cluster.local
            port:
              number: 8080
      timeout: 5s
    - match:
        - uri:
            prefix: /api/v1/recommendations
      route:
        - destination:
            host: recommendation.shopee.svc.cluster.local
            port:
              number: 8080
      timeout: 10s
    - match:
        - uri:
            prefix: /api/v1/notifications
      route:
        - destination:
            host: notification.shopee.svc.cluster.local
            port:
              number: 8080
      timeout: 10s
    - route:
        - destination:
            host: api-gateway.shopee.svc.cluster.local
            port:
              number: 8080
