prometheus:
  enabled: true
  server:
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    extraFlags:
      - --storage.tsdb.retention.time=30d
      - --storage.tsdb.retention.size=80GB
      - --web.enable-lifecycle
      - --web.enable-admin-api
    resources:
      requests:
        cpu: 1
        memory: 4Gi
      limits:
        cpu: 4
        memory: 8Gi
    persistentVolume:
      enabled: true
      size: 100Gi
    service:
      type: ClusterIP
    # Prometheus v25.x compatibility
    enableAdminAPI: true
    enableRemoteWriteReceiver: true

grafana:
  enabled: true
  adminPassword: admin
  persistence:
    enabled: true
    size: 10Gi
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://prometheus-server:80
          isDefault: true
          editable: false
          jsonData:
            timeInterval: 15s
            queryTimeout: 30s
            httpMethod: POST
        - name: Loki
          type: loki
          url: http://loki:3100
          editable: false
          jsonData:
            maxLines: 1000
        - name: Tempo
          type: tempo
          url: http://tempo:3200
          editable: false
          jsonData:
            nodeGraph:
              enabled: true
            search:
              hide: false
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: shopee
          orgId: 1
          folder: Shopee
          type: file
          disableDeletion: true
          editable: true
          options:
            path: /var/lib/grafana/dashboards/shopee
  # Grafana v7.3 resource tuning
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 2Gi

loki:
  enabled: true
  loki:
    auth_enabled: false
    limits_config:
      ingestion_rate_mb: 16
      ingestion_burst_size_mb: 32
      max_streams_per_user: 10000
      max_entries_limit_per_query: 5000
      max_line_size: 256KB
    storage:
      type: filesystem
    compactor:
      working_directory: /data/loki/compactor
      shared_store: filesystem
      compaction_interval: 10m
    table_manager:
      retention_deletes_enabled: true
      retention_period: 744h
  persistence:
    enabled: true
    size: 50Gi
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2
      memory: 4Gi

tempo:
  enabled: true
  persistence:
    enabled: true
    size: 50Gi
  tempo:
    storage:
      trace:
        backend: local
        local:
          path: /data/tempo/blocks
        wal:
          path: /data/tempo/wal
    overrides:
      metrics_generator_processors:
        - service-graphs
        - span-metrics
    metrics_generator:
      registry:
        external_labels:
          cluster: shopee-clone
      storage:
        path: /data/tempo/generator
        remote_write:
          - url: http://prometheus:9090/api/v1/write
            send_exemplars: true
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2
      memory: 4Gi

otel:
  enabled: true
  mode: deployment
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
    processors:
      batch:
        timeout: 1s
        send_batch_size: 1024
    exporters:
      prometheus:
        endpoint: 0.0.0.0:8889
      otlp/tempo:
        endpoint: tempo:4317

redis:
  enabled: true
  cluster:
    enabled: true
    nodes: 6
    replicas: 1
  persistence:
    enabled: true
    size: 50Gi
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2
      memory: 4Gi

kafka:
  enabled: true
  replicas: 3
  persistence:
    enabled: true
    size: 100Gi
  resources:
    requests:
      cpu: 1
      memory: 4Gi
    limits:
      cpu: 4
      memory: 8Gi
  zookeeper:
    replicas: 3
    persistence:
      enabled: true
      size: 20Gi

minio:
  enabled: true
  mode: distributed
  replicas: 4
  persistence:
    enabled: true
    size: 100Gi
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: 2
      memory: 8Gi

ingress:
  enabled: true
  controller:
    config:
      proxy-body-size: "10m"
      proxy-read-timeout: "60"
      use-forwarded-headers: "true"
      ssl-protocols: "TLSv1.2 TLSv1.3"
      ssl-ciphers: "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256"
      gzip-level: "6"
      gzip-types: "application/json application/javascript text/css text/plain"
      limit-rate-after: "10m"
      limit-rate: "100k"
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2
        memory: 4Gi
    autoscaling:
      enabled: true
      minReplicas: 3
      maxReplicas: 10
      targetCPUUtilizationPercentage: 70

cert-manager:
  enabled: true
  installCRDs: true

argocd:
  enabled: true
  configs:
    params:
      server.insecure: true
    rbac:
      policy.default: role:readonly
      policy.csv: |
        p, role:devops, applications, *, */*, allow
        p, role:devops, clusters, get, *, allow
        p, role:devops, repositories, *, *, allow
        p, role:devops, projects, *, *, allow
        g, devops, role:devops

external-secrets:
  enabled: true
  installCRDs: true

vault:
  enabled: true
  server:
    ha:
      enabled: true
      replicas: 3
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2
        memory: 4Gi
    dataStorage:
      enabled: true
      size: 10Gi
