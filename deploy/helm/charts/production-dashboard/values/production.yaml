# Production overrides for production-dashboard
replicaCount: 5

image:
  tag: stable
  pullPolicy: Always

resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "1Gi"
    cpu: "1000m"

autoscaling:
  enabled: true
  minReplicas: 5
  maxReplicas: 20
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 70

env:
  APP_ENV: "production"
  LOG_LEVEL: "warn"
  SERVICES_POLL_INTERVAL: "15s"
