{{- if .Values.secrets.mysqlPassword }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "production-dashboard.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "production-dashboard.labels" . | nindent 4 }}
type: Opaque
data:
  mysql-host: {{ .Values.secrets.mysqlHost | b64enc }}
  mysql-port: {{ .Values.secrets.mysqlPort | b64enc }}
  mysql-user: {{ .Values.secrets.mysqlUser | b64enc }}
  mysql-password: {{ .Values.secrets.mysqlPassword | b64enc }}
  mysql-database: {{ .Values.secrets.mysqlDatabase | b64enc }}
  jwt-access-secret: {{ .Values.secrets.jwtAccessSecret | b64enc }}
{{- end }}
