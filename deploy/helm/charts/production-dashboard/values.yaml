# Default values for production-dashboard
replicaCount: 3

image:
  repository: ghcr.io/shopee-clone/production-dashboard
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  httpPort: 8080
  grpcPort: 9090

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

env:
  APP_ENV: "production"
  LOG_LEVEL: "info"
  DASHBOARD_HTTP_PORT: "8080"
  DASHBOARD_GRPC_PORT: "9090"
  MYSQL_MAX_OPEN_CONNS: "25"
  MYSQL_MAX_IDLE_CONNS: "10"
  REDIS_ADDR: "redis-cluster:6379"
  KAFKA_BROKERS: "kafka:9092"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
  SERVICES_POLL_INTERVAL: "30s"
  INCIDENT_RETENTION_DAYS: "90"
  METRICS_RETENTION_DAYS: "30"
  MAX_ALERT_RULES: "500"

secrets:
  mysqlHost: "mysql-primary.shopee-data.svc.cluster.local"
  mysqlPort: "3306"
  mysqlUser: "shopee"
  mysqlPassword: ""
  mysqlDatabase: "shopeeDashboard"
  jwtAccessSecret: ""

probes:
  liveness:
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 15
  readiness:
    path: /ready
    initialDelaySeconds: 5
    periodSeconds: 10

podDisruptionBudget:
  minAvailable: 2

nodeSelector: {}
tolerations: []
affinity: {}
