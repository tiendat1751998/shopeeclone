# Default values for identity-auth
replicaCount: 3

image:
  repository: ghcr.io/shopee-clone/identity-auth
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8080
  grpcPort: 8081

resources:
  requests:
    memory: "512Mi"
    cpu: "200m"
  limits:
    memory: "1Gi"
    cpu: "1000m"

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 15
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

env:
  SPRING_PROFILES_ACTIVE: "production"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "shopee_auth"
  REDIS_HOST: "redis-cluster"
  REDIS_PORT: "6379"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
  JWT_ACCESS_TTL_SECONDS: "900"
  JWT_REFRESH_TTL_SECONDS: "604800"
  RATE_LIMIT_LOGIN_MAX: "5"
  RATE_LIMIT_LOGIN_WINDOW: "300"
  ACCOUNT_LOCKOUT_MAX: "5"
  ACCOUNT_LOCKOUT_DURATION: "15"
  LOG_LEVEL: "INFO"

secrets:
  postgresUser: ""
  postgresPassword: ""
  jwtAccessSecret: ""
  jwtRefreshSecret: ""
  jwtRsaPrivateKey: ""
  jwtRsaPublicKey: ""

probes:
  liveness:
    path: /actuator/health/liveness
    initialDelaySeconds: 30
    periodSeconds: 15
  readiness:
    path: /actuator/health/readiness
    initialDelaySeconds: 30
    periodSeconds: 10

podDisruptionBudget:
  minAvailable: 2

javaOpts: "-XX:+UseG1GC -XX:MaxGCPauseMillis=100 -XX:+ParallelRefProcEnabled -XX:MaxRAMPercentage=75.0 -Djava.security.egd=file:/dev/./urandom"

nodeSelector: {}
tolerations: []
affinity: {}
