apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "catalog-product.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "catalog-product.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "catalog-product.selectorLabels" . | nindent 6 }}
