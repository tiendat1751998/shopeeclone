apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: catalog-product
  namespace: shopee
spec:
  hosts:
    - catalog-product
  http:
    - match:
        - port: 8080
      route:
        - destination:
            host: catalog-product
            port:
              number: 8080
          weight: 100
      retries:
        attempts: 3
        perTryTimeout: 2s
      timeout: 10s
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: catalog-product
  namespace: shopee
spec:
  host: catalog-product
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        http1MaxPendingRequests: 1000
        maxRequestsPerConnection: 10
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 60s
      maxEjectionPercent: 50
    tls:
      mode: ISTIO_MUTUAL
  subsets:
    - name: stable
      labels:
        version: stable
    - name: canary
      labels:
        version: canary
