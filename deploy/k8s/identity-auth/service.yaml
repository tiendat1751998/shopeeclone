apiVersion: v1
kind: Service
metadata:
  name: identity-auth
  namespace: shopee
  labels:
    app: identity-auth
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      name: http
      protocol: TCP
  selector:
    app: identity-auth
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: identity-auth
  namespace: shopee
  labels:
    app: identity-auth
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: identity-auth
  namespace: shopee
  labels:
    app: identity-auth
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: identity-auth
  minReplicas: 3
  maxReplicas: 15
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: identity-auth
  namespace: shopee
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: identity-auth
