apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: admin-panel
  namespace: shopee
spec:
  podSelector:
    matchLabels:
      app: admin-panel
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: shopee-ingress
      ports:
        - protocol: TCP
          port: 3001
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: gateway
      ports:
        - protocol: TCP
          port: 8080
    - to:
        - podSelector:
            matchLabels:
              app: auth
      ports:
        - protocol: TCP
          port: 8080
