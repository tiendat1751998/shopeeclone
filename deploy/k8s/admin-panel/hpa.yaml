apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: admin-panel
  namespace: tiki
  labels:
    app: admin-panel
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: admin-panel
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 120
