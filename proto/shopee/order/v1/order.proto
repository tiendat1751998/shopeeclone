syntax = "proto3";

package shopee.order.v1;

option java_package = "com.shopee.order.grpc";

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";
import "validate/validate.proto";

service OrderService {
  rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse);
  rpc GetOrder(GetOrderRequest) returns (GetOrderResponse);
  rpc ListOrders(ListOrdersRequest) returns (ListOrdersResponse);
  rpc UpdateOrderStatus(UpdateOrderStatusRequest) returns (UpdateOrderStatusResponse);
  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse);
}

message Order {
  string order_id = 1;
  string buyer_id = 2;
  string seller_id = 3;
  string payment_method = 4;
  double total_amount = 5;
  double discount_amount = 6;
  double shipping_fee = 7;
  double final_amount = 8;
  string status = 9;
  string shipping_address = 10;
  repeated OrderItem items = 11;
  google.protobuf.Timestamp created_at = 12;
  google.protobuf.Timestamp updated_at = 13;
}

message OrderItem {
  string item_id = 1;
  string sku_id = 2;
  string title = 3;
  string image = 4;
  double price = 5;
  int32 quantity = 6;
}

message CreateOrderRequest {
  string buyer_id = 1 [(validate.rules).string.min_len = 1];
  string seller_id = 2 [(validate.rules).string.min_len = 1];
  string payment_method = 3 [(validate.rules).string.min_len = 1];
  string shipping_address = 4 [(validate.rules).string.min_len = 1];
  repeated OrderItemRequest items = 5 [(validate.rules).repeated.min_items = 1];
  string voucher_code = 6;
  int32 shopee_coins = 7;
}

message OrderItemRequest {
  string sku_id = 1 [(validate.rules).string.min_len = 1];
  int32 quantity = 2 [(validate.rules).int32.gt = 0];
  double price = 3 [(validate.rules).double.gt = 0];
}

message CreateOrderResponse {
  Order order = 1;
}

message GetOrderRequest {
  string order_id = 1 [(validate.rules).string.min_len = 1];
}

message GetOrderResponse {
  Order order = 1;
}

message ListOrdersRequest {
  string buyer_id = 1;
  string seller_id = 2;
  string status = 3;
  int32 page = 4;
  int32 size = 5;
}

message ListOrdersResponse {
  repeated Order orders = 1;
  int64 total = 2;
  int32 page = 3;
  int32 size = 4;
}

message UpdateOrderStatusRequest {
  string order_id = 1 [(validate.rules).string.min_len = 1];
  string status = 2 [(validate.rules).string.min_len = 1];
}

message UpdateOrderStatusResponse {
  Order order = 1;
}

message CancelOrderRequest {
  string order_id = 1 [(validate.rules).string.min_len = 1];
  string reason = 2;
}

message CancelOrderResponse {
  Order order = 1;
}
