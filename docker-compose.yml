services:
  # ============================================================
  # Infrastructure
  # ============================================================
  mysql-primary:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: tiki_platform
      MYSQL_USER: tiki
      MYSQL_PASSWORD: tiki_dev
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init-databases.sql:/docker-entrypoint-initdb.d/01-init-databases.sql
      - ./configs/mysql-performance.cnf:/etc/mysql/conf.d/performance.cnf
    command: >
      --default-authentication-plugin=mysql_native_password
      --max-connections=2000
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

  redis-master:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    command: redis-server --maxclients 50000 --tcp-backlog 4096 --save "" --appendonly no

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.91.0
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    volumes:
      - ./configs/otel-collector.yaml:/etc/otelcol-contrib/config.yaml

  prometheus:
    image: prom/prometheus:v3.2.1
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./configs/prometheus-alerts.yml:/etc/prometheus/rules/alerts.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=80GB'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 4G

  grafana:
    image: grafana/grafana:11.5.2
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3001
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/platform/monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
      - ./deploy/platform/monitoring/grafana/dashboards/dashboard-provider.yaml:/etc/grafana/provisioning/dashboards/dashboard-provider.yaml
      - ./deploy/platform/monitoring/grafana/dashboards/shopee:/var/lib/grafana/dashboards/shopee
      - ./deploy/platform/monitoring/grafana/alerting:/etc/grafana/provisioning/alerting
    depends_on:
      - prometheus
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  jaeger:
    image: jaegertracing/all-in-one:1.52
    ports:
      - "16686:16686"  # UI
      - "14268:14268"  # Collector

  # ============================================================
  # Core Services
  # ============================================================
  identity-auth:
    build:
      context: ./services/identity-auth
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MYSQL_HOST: mysql-primary
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: tiki_auth
      MYSQL_USER: "tiki"
      MYSQL_PASSWORD: "tiki_dev"
      REDIS_HOST: redis-master
      REDIS_PORT: "6379"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_ACCESS_SECRET: dev-access-secret-key-for-local-development-only
      JWT_REFRESH_SECRET: dev-refresh-secret-key-for-local-development-only
    depends_on:
      mysql-primary:
        condition: service_healthy
      redis-master:
        condition: service_healthy

  inventory:
    build:
      context: .
      dockerfile: ./services/inventory/Dockerfile
    ports:
      - "8086:8086"
    environment:
      APP_ENV: development
      INVENTORY_HTTP_PORT: "8086"
      INVENTORY_GRPC_PORT: "9096"
      MYSQL_HOST: mysql-primary
      MYSQL_PORT: "3306"
      MYSQL_USER: "tiki"
      MYSQL_PASSWORD: "tiki_dev"
      MYSQL_DATABASE: tiki_inventory
      REDIS_ADDR: redis-master:6379
      KAFKA_BROKERS: kafka:9092
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      JWT_ACCESS_SECRET: dev-access-secret-key-for-local-development-only
    depends_on:
      mysql-primary:
        condition: service_healthy
      redis-master:
        condition: service_healthy

  cart:
    build:
      context: .
      dockerfile: ./services/cart/Dockerfile
    ports:
      - "8082:8082"
    environment:
      APP_ENV: development
      CART_HTTP_PORT: "8082"
      CART_GRPC_PORT: "9092"
      MYSQL_HOST: mysql-primary
      MYSQL_PORT: "3306"
      MYSQL_USER: "tiki"
      MYSQL_PASSWORD: "tiki_dev"
      MYSQL_DATABASE: tiki_cart
      REDIS_ADDR: redis-master:6379
      KAFKA_BROKERS: kafka:9092
      JWT_ACCESS_SECRET: dev-access-secret-key-for-local-development-only
    depends_on:
      mysql-primary:
        condition: service_healthy
      redis-master:
        condition: service_healthy

  payment:
    build:
      context: .
      dockerfile: ./services/payment/Dockerfile
    ports:
      - "8083:8083"
      - "9093:9093"
    environment:
      APP_ENV: development
      PAYMENT_HTTP_PORT: "8083"
      PAYMENT_GRPC_PORT: "9093"
      MYSQL_HOST: mysql-primary
      MYSQL_PORT: "3306"
      MYSQL_USER: "tiki"
      MYSQL_PASSWORD: "tiki_dev"
      MYSQL_DATABASE: tiki_payment
      REDIS_ADDR: redis-master:6379
      KAFKA_BROKERS: kafka:9092
      JWT_ACCESS_SECRET: dev-access-secret-key-for-local-development-only
      WEBHOOK_SECRET: dev-webhook-secret-for-local-development
    depends_on:
      mysql-primary:
        condition: service_healthy
      redis-master:
        condition: service_healthy

  order:
    build:
      context: .
      dockerfile: ./services/order/Dockerfile
    ports:
      - "8084:8084"
      - "9094:9094"
    environment:
      APP_ENV: development
      ORDER_HTTP_PORT: "8084"
      ORDER_GRPC_PORT: "9094"
      MYSQL_HOST: mysql-primary
      MYSQL_PORT: "3306"
      MYSQL_USER: "tiki"
      MYSQL_PASSWORD: "tiki_dev"
      MYSQL_DATABASE: tiki_order
      REDIS_ADDR: redis-master:6379
      KAFKA_BROKERS: kafka:9092
      JWT_ACCESS_SECRET: dev-access-secret-key-for-local-development-only
    depends_on:
      mysql-primary:
        condition: service_healthy
      redis-master:
        condition: service_healthy

  checkout:
    build:
      context: .
      dockerfile: ./services/checkout/Dockerfile
    ports:
      - "8085:8085"
      - "9095:9095"
    environment:
      APP_ENV: development
      CHECKOUT_HTTP_PORT: "8085"
      CHECKOUT_GRPC_PORT: "9095"
      MYSQL_HOST: mysql-primary
      MYSQL_PORT: "3306"
      MYSQL_USER: "tiki"
      MYSQL_PASSWORD: "tiki_dev"
      MYSQL_DATABASE: tiki_checkout
      REDIS_ADDR: redis-master:6379
      KAFKA_BROKERS: kafka:9092
      JWT_ACCESS_SECRET: dev-access-secret-key-for-local-development-only
    depends_on:
      mysql-primary:
        condition: service_healthy
      redis-master:
        condition: service_healthy

  gateway:
    build:
      context: .
      dockerfile: ./services/gateway/Dockerfile
    expose:
      - "8080"
    environment:
      APP_ENV: development
      GATEWAY_HTTP_PORT: "8080"
      GATEWAY_GRPC_PORT: "9090"
      REDIS_ADDR: redis-master:6379
      KAFKA_BROKERS: kafka:9092
      JWT_ACCESS_SECRET: dev-access-secret-key-for-local-development-only
      ENCRYPTION_KEY: b8477fd5d6f4c7b22878f8d3b873778e28fcac8e34a0be45cdf014bbb31571d7
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      UPSTREAM_AUTH_SERVICE: auth:8087
      UPSTREAM_CATALOG_SERVICE: catalog-product:8088
      UPSTREAM_CART_SERVICE: cart:8082
      UPSTREAM_ORDER_SERVICE: order:8084
      UPSTREAM_INVENTORY_SERVICE: inventory:8086
      UPSTREAM_PAYMENT_SERVICE: payment:8083
      UPSTREAM_PRODUCT_SERVICE: product:8089
      UPSTREAM_PRODUCT_CATALOG_SERVICE: product-catalog:8090
      UPSTREAM_PROMOTION_SERVICE: promotion:8091
      UPSTREAM_SHIPMENT_SERVICE: shipment:8092
      UPSTREAM_MAX_IDLE_CONNS: "2000"
      UPSTREAM_IDLE_CONN_TIMEOUT: "300s"
      RATE_LIMIT_ENABLED: "false"
      CIRCUIT_BREAKER_ENABLED: "false"
      SERVER_READ_TIMEOUT: "30s"
      SERVER_WRITE_TIMEOUT: "30s"
      SERVER_IDLE_TIMEOUT: "300s"
    depends_on:
      redis-master:
        condition: service_healthy
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    sysctls:
      - net.core.somaxconn=65536
      - net.ipv4.tcp_fin_timeout=15
      - net.ipv4.tcp_tw_reuse=1

  gateway-2:
    build:
      context: .
      dockerfile: ./services/gateway/Dockerfile
    expose:
      - "8080"
    environment:
      APP_ENV: development
      GATEWAY_HTTP_PORT: "8080"
      GATEWAY_GRPC_PORT: "9090"
      REDIS_ADDR: redis-master:6379
      KAFKA_BROKERS: kafka:9092
      JWT_ACCESS_SECRET: dev-access-secret-key-for-local-development-only
      ENCRYPTION_KEY: b8477fd5d6f4c7b22878f8d3b873778e28fcac8e34a0be45cdf014bbb31571d7
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      UPSTREAM_AUTH_SERVICE: auth:8087
      UPSTREAM_CATALOG_SERVICE: catalog-product:8088
      UPSTREAM_CART_SERVICE: cart:8082
      UPSTREAM_ORDER_SERVICE: order:8084
      UPSTREAM_INVENTORY_SERVICE: inventory:8086
      UPSTREAM_PAYMENT_SERVICE: payment:8083
      UPSTREAM_PRODUCT_SERVICE: product:8089
      UPSTREAM_PRODUCT_CATALOG_SERVICE: product-catalog:8090
      UPSTREAM_PROMOTION_SERVICE: promotion:8091
      UPSTREAM_SHIPMENT_SERVICE: shipment:8092
      UPSTREAM_MAX_IDLE_CONNS: "2000"
      UPSTREAM_IDLE_CONN_TIMEOUT: "300s"
      RATE_LIMIT_ENABLED: "false"
      CIRCUIT_BREAKER_ENABLED: "false"
      SERVER_READ_TIMEOUT: "30s"
      SERVER_WRITE_TIMEOUT: "30s"
      SERVER_IDLE_TIMEOUT: "300s"
    depends_on:
      redis-master:
        condition: service_healthy
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    sysctls:
      - net.core.somaxconn=65536
      - net.ipv4.tcp_fin_timeout=15
      - net.ipv4.tcp_tw_reuse=1

  auth:
    build:
      context: .
      dockerfile: ./services/auth/Dockerfile
    ports:
      - "8087:8087"
      - "9097:9097"
    environment:
      APP_ENV: development
      AUTH_HTTP_PORT: "8087"
      AUTH_GRPC_PORT: "9097"
      MYSQL_HOST: mysql-primary
      MYSQL_PORT: "3306"
      MYSQL_USER: "tiki"
      MYSQL_PASSWORD: "tiki_dev"
      MYSQL_DATABASE: tiki_auth
      REDIS_ADDR: redis-master:6379
      KAFKA_BROKERS: kafka:9092
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      JWT_ACCESS_SECRET: dev-access-secret-key-for-local-development-only
      JWT_REFRESH_SECRET: dev-refresh-secret-key-for-local-development-only
    depends_on:
      mysql-primary:
        condition: service_healthy
      redis-master:
        condition: service_healthy

  catalog-product:
    build:
      context: .
      dockerfile: ./services/catalog-product/Dockerfile
    ports:
      - "8088:8088"
      - "9098:9098"
    environment:
      APP_ENV: development
      PORT: "8088"
      HTTP_PORT: "8088"
      GRPC_PORT: "9098"
      MYSQL_HOST: mysql-primary
      MYSQL_PORT: "3306"
      MYSQL_USER: "tiki"
      MYSQL_PASSWORD: "tiki_dev"
      MYSQL_DATABASE: tiki_platform
      REDIS_ADDR: redis-master:6379
      KAFKA_BROKERS: kafka:9092
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DATABASE: tiki_catalog
    depends_on:
      mysql-primary:
        condition: service_healthy
      redis-master:
        condition: service_healthy
      mongodb:
        condition: service_healthy

  product:
    build:
      context: .
      dockerfile: ./services/product/Dockerfile
    ports:
      - "8089:8089"
      - "9099:9099"
    environment:
      APP_ENV: development
      HTTP_PORT: "8089"
      GRPC_PORT: "9099"
      MYSQL_HOST: mysql-primary
      MYSQL_PORT: "3306"
      MYSQL_USER: "tiki"
      MYSQL_PASSWORD: "tiki_dev"
      MYSQL_DATABASE: tiki_platform
      REDIS_ADDR: redis-master:6379
      KAFKA_BROKERS: kafka:9092
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    depends_on:
      mysql-primary:
        condition: service_healthy
      redis-master:
        condition: service_healthy

  product-catalog:
    build:
      context: .
      dockerfile: ./services/product-catalog/Dockerfile
    ports:
      - "8090:8090"
      - "9100:9100"
    environment:
      APP_ENV: development
      CATALOG_HTTP_PORT: "8090"
      CATALOG_GRPC_PORT: "9100"
      MYSQL_HOST: mysql-primary
      MYSQL_PORT: "3306"
      MYSQL_USER: "tiki"
      MYSQL_PASSWORD: "tiki_dev"
      MYSQL_DATABASE: tiki_platform
      REDIS_ADDR: redis-master:6379
      KAFKA_BROKERS: kafka:9092
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      JWT_ACCESS_SECRET: dev-access-secret-key-for-local-development-only
    depends_on:
      mysql-primary:
        condition: service_healthy
      redis-master:
        condition: service_healthy

  promotion:
    build:
      context: .
      dockerfile: ./services/promotion/Dockerfile
    ports:
      - "8091:8091"
      - "9101:9101"
    environment:
      APP_ENV: development
      PROMOTION_HTTP_PORT: "8091"
      PROMOTION_GRPC_PORT: "9101"
      MYSQL_HOST: mysql-primary
      MYSQL_PORT: "3306"
      MYSQL_USER: "tiki"
      MYSQL_PASSWORD: "tiki_dev"
      MYSQL_DATABASE: tiki_platform
      REDIS_ADDR: redis-master:6379
      KAFKA_BROKERS: kafka:9092
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    depends_on:
      mysql-primary:
        condition: service_healthy
      redis-master:
        condition: service_healthy

  shipment:
    build:
      context: .
      dockerfile: ./services/shipment/Dockerfile
    ports:
      - "8092:8092"
      - "9102:9102"
    environment:
      APP_ENV: development
      SHIPMENT_HTTP_PORT: "8092"
      SHIPMENT_GRPC_PORT: "9102"
      MYSQL_HOST: mysql-primary
      MYSQL_PORT: "3306"
      MYSQL_USER: tiki
      MYSQL_PASSWORD: tiki_dev
      MYSQL_DATABASE: tiki_platform
      REDIS_ADDR: redis-master:6379
      KAFKA_BROKERS: kafka:9092
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      # Delivery tracker config
      NOMINATIM_BASE_URL: https://nominatim.openstreetmap.org
      NOMINATIM_USER_AGENT: tiki-shipment/1.0
      OSRM_BASE_URL: https://router.project-osrm.org
    depends_on:
      mysql-primary:
        condition: service_healthy
      redis-master:
        condition: service_healthy

  # ============================================================
  # Frontend
  # ============================================================
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        GATEWAY_URL: http://gateway:8080
        MYSQL_HOST: mysql-primary
        MYSQL_PORT: "3306"
        MYSQL_USER: "tiki"
        MYSQL_PASSWORD: "tiki_dev"
        MYSQL_DATABASE: tiki_platform
    expose:
      - "3000"
    volumes:
      - ./apps/web/public/images:/app/public/images:ro
    environment:
      NODE_ENV: production
      GATEWAY_URL: http://gateway:8080
      MYSQL_HOST: mysql-primary
      MYSQL_PORT: "3306"
      MYSQL_USER: "tiki"
      MYSQL_PASSWORD: "tiki_dev"
      MYSQL_DATABASE: tiki_platform
    depends_on:
      gateway:
        condition: service_started
      mysql-primary:
        condition: service_healthy

  web-tls:
    image: nginx:alpine
    ports:
      - "3000:3000"
      - "8443:443"
    volumes:
      - ./configs/nginx-tls.conf:/etc/nginx/conf.d/default.conf
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - web

volumes:
  mysql_data:
  redis_data:
  mongo_data:
  grafana_data:
