version: "3.9"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-common-env: &common-env
  APP_ENV: ${APP_ENV:-development}
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
  OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
  OTEL_TRACES_SAMPLER: parentbased_traceidratio
  OTEL_TRACES_SAMPLER_ARG: "0.1"

services:
  # ============================================
  # PostgreSQL - Auth, Order, Payment
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: shopee-postgres
    environment:
      POSTGRES_USER: shopee
      POSTGRES_PASSWORD: shopee_dev
      POSTGRES_DB: shopee
      POSTGRES_MULTIPLE_DBS: shopee_auth,shopee_order,shopee_payment
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./deploy/compose/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopee"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ============================================
  # MongoDB - Product Catalog
  # ============================================
  mongodb:
    image: mongo:7
    container_name: shopee-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: shopee
      MONGO_INITDB_ROOT_PASSWORD: shopee_dev
      MONGO_INITDB_DATABASE: shopee_catalog
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ============================================
  # Redis Cluster
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: shopee-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging: *default-logging

  # ============================================
  # Apache Kafka
  # ============================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6
    container_name: shopee-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    logging: *default-logging

  kafka:
    image: confluentinc/cp-kafka:7.6
    container_name: shopee-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  kafka-init:
    image: confluentinc/cp-kafka:7.6
    container_name: shopee-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: |
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic order.created --partitions 3 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic order.cancelled --partitions 3 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic payment.completed --partitions 3 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic payment.failed --partitions 3 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic inventory.reserved --partitions 3 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic inventory.released --partitions 3 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic notification.send --partitions 3 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic search.sync --partitions 3 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic shipping.update --partitions 3 --replication-factor 1 &&
      echo "Topics created successfully"

  # ============================================
  # Elasticsearch
  # ============================================
  elasticsearch:
    image: elasticsearch:8.12
    container_name: shopee-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *default-logging

  # ============================================
  # MinIO - Object Storage
  # ============================================
  minio:
    image: minio/minio:latest
    container_name: shopee-minio
    environment:
      MINIO_ROOT_USER: shopee_access
      MINIO_ROOT_PASSWORD: shopee_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ============================================
  # OpenTelemetry Collector
  # ============================================
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.97
    container_name: shopee-otel
    command: ["--config=/etc/otel-collector.yaml"]
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
      - "8889:8889"
    volumes:
      - ./deploy/compose/otel-collector.yaml:/etc/otel-collector.yaml:ro
    logging: *default-logging

  # ============================================
  # Prometheus
  # ============================================
  prometheus:
    image: prom/prometheus:v2.51
    container_name: shopee-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/compose/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    logging: *default-logging

  # ============================================
  # Grafana
  # ============================================
  grafana:
    image: grafana/grafana:10.4
    container_name: shopee-grafana
    ports:
      - "3000:3000"
    volumes:
      - ./deploy/compose/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - grafana-data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    logging: *default-logging

volumes:
  postgres-data:
  mongodb-data:
  redis-data:
  kafka-data:
  elasticsearch-data:
  minio-data:
  prometheus-data:
  grafana-data:
