version: '3.8'

services:
  # ============================================================
  # Infrastructure
  # ============================================================
  mysql-primary:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: shopee_platform
      MYSQL_USER: shopee
      MYSQL_PASSWORD: shopee_dev
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-master:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.91.0
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    volumes:
      - ./configs/otel-collector.yaml:/etc/otelcol-contrib/config.yaml

  prometheus:
    image: prom/prometheus:v2.48.0
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml

  jaeger:
    image: jaegertracing/all-in-one:1.52
    ports:
      - "16686:16686"  # UI
      - "14268:14268"  # Collector

  # ============================================================
  # Core Services
  # ============================================================
  identity-auth:
    build:
      context: ./services/identity-auth
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
      - "9090:9090"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-primary:3306/shopee_auth
      SPRING_REDIS_HOST: redis-master
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      mysql-primary:
        condition: service_healthy
      redis-master:
        condition: service_healthy

  inventory:
    build:
      context: ./services/inventory
      dockerfile: Dockerfile
    ports:
      - "8086:8086"
      - "9096:9096"
    environment:
      APP_ENV: development
      INVENTORY_HTTP_PORT: "8086"
      INVENTORY_GRPC_PORT: "9096"
      MYSQL_HOST: mysql-primary
      MYSQL_PORT: "3306"
      MYSQL_USER: shopee
      MYSQL_PASSWORD: shopee_dev
      MYSQL_DATABASE: shopee_inventory
      REDIS_ADDR: redis-master:6379
      KAFKA_BROKERS: kafka:9092
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    depends_on:
      mysql-primary:
        condition: service_healthy
      redis-master:
        condition: service_healthy

  cart:
    build:
      context: ./services/cart
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
      - "9092:9092"
    environment:
      APP_ENV: development
      CART_HTTP_PORT: "8082"
      CART_GRPC_PORT: "9092"
      MYSQL_HOST: mysql-primary
      MYSQL_PORT: "3306"
      MYSQL_USER: shopee
      MYSQL_PASSWORD: shopee_dev
      MYSQL_DATABASE: shopee_cart
      REDIS_ADDR: redis-master:6379
      KAFKA_BROKERS: kafka:9092
    depends_on:
      mysql-primary:
        condition: service_healthy
      redis-master:
        condition: service_healthy

  payment:
    build:
      context: ./services/payment
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
      - "9093:9093"
    environment:
      APP_ENV: development
      PAYMENT_HTTP_PORT: "8083"
      PAYMENT_GRPC_PORT: "9093"
      MYSQL_HOST: mysql-primary
      MYSQL_PORT: "3306"
      MYSQL_USER: shopee
      MYSQL_PASSWORD: shopee_dev
      MYSQL_DATABASE: shopee_payment
      REDIS_ADDR: redis-master:6379
      KAFKA_BROKERS: kafka:9092
    depends_on:
      mysql-primary:
        condition: service_healthy
      redis-master:
        condition: service_healthy

  order:
    build:
      context: ./services/order
      dockerfile: Dockerfile
    ports:
      - "8084:8084"
      - "9094:9094"
    environment:
      APP_ENV: development
      ORDER_HTTP_PORT: "8084"
      ORDER_GRPC_PORT: "9094"
      MYSQL_HOST: mysql-primary
      MYSQL_PORT: "3306"
      MYSQL_USER: shopee
      MYSQL_PASSWORD: shopee_dev
      MYSQL_DATABASE: shopee_order
      REDIS_ADDR: redis-master:6379
      KAFKA_BROKERS: kafka:9092
    depends_on:
      mysql-primary:
        condition: service_healthy
      redis-master:
        condition: service_healthy

  checkout:
    build:
      context: ./services/checkout
      dockerfile: Dockerfile
    ports:
      - "8085:8085"
      - "9095:9095"
    environment:
      APP_ENV: development
      CHECKOUT_HTTP_PORT: "8085"
      CHECKOUT_GRPC_PORT: "9095"
      MYSQL_HOST: mysql-primary
      MYSQL_PORT: "3306"
      MYSQL_USER: shopee
      MYSQL_PASSWORD: shopee_dev
      MYSQL_DATABASE: shopee_checkout
      REDIS_ADDR: redis-master:6379
      KAFKA_BROKERS: kafka:9092
    depends_on:
      mysql-primary:
        condition: service_healthy
      redis-master:
        condition: service_healthy

  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      APP_ENV: development
      GATEWAY_HTTP_PORT: "8080"
      GATEWAY_GRPC_PORT: "9090"
      REDIS_ADDR: redis-master:6379
      KAFKA_BROKERS: kafka:9092
      JWKS_ENDPOINT: http://identity-auth:8081/.well-known/jwks.json
    depends_on:
      redis-master:
        condition: service_healthy
      identity-auth:
        condition: service_started

volumes:
  mysql_data:
  redis_data:
