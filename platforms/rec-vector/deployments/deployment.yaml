apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopee-rec-vector
  labels:
    app: shopee-rec-vector
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shopee-rec-vector
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: shopee-rec-vector
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8101"
    spec:
      serviceAccountName: shopee-rec-vector
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: shopee-rec-vector
          image: shopee-clone/shopee-rec-vector:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8101
            - name: grpc
              containerPort: 9101
          envFrom:
            - configMapRef:
                name: shopee-rec-vector-config
            - secretRef:
                name: shopee-rec-vector-secrets
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 1
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
