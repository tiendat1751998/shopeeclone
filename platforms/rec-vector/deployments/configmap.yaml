apiVersion: v1
kind: ConfigMap
metadata:
  name: shopee-rec-vector-config
data:
  APP_NAME: "shopee-rec-vector"
  APP_ENV: "production"
  LOG_LEVEL: "info"
  REC_VECTOR_HTTP_PORT: "8101"
  REC_VECTOR_GRPC_PORT: "9101"
  REDIS_ADDR: "redis-master.cache:6379"
  KAFKA_BROKERS: "kafka-headless.kafka:9092"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.monitoring:4318"
