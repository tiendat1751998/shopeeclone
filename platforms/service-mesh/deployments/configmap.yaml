apiVersion: v1
kind: ConfigMap
metadata:
  name: shopee-service-mesh-config
data:
  APP_NAME: "shopee-service-mesh"
  APP_ENV: "production"
  LOG_LEVEL: "info"
  SERVICE_MESH_HTTP_PORT: "8108"
  SERVICE_MESH_GRPC_PORT: "9108"
  REDIS_ADDR: "redis-master.cache:6379"
  KAFKA_BROKERS: "kafka-headless.kafka:9092"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.monitoring:4318"
