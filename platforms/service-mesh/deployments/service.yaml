apiVersion: v1
kind: Service
metadata:
  name: shopee-service-mesh
  labels:
    app: shopee-service-mesh
spec:
  type: ClusterIP
  ports:
    - port: 8108
      targetPort: http
      protocol: TCP
      name: http
    - port: 9108
      targetPort: grpc
      protocol: TCP
      name: grpc
  selector:
    app: shopee-service-mesh
