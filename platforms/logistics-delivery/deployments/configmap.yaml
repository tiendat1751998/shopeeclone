apiVersion: v1
kind: ConfigMap
metadata:
  name: shopee-logistics-delivery-config
data:
  APP_NAME: "shopee-logistics-delivery"
  APP_ENV: "production"
  LOG_LEVEL: "info"
  LOGISTICS_DELIVERY_HTTP_PORT: "8104"
  LOGISTICS_DELIVERY_GRPC_PORT: "9104"
  REDIS_ADDR: "redis-master.cache:6379"
  KAFKA_BROKERS: "kafka-headless.kafka:9092"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.monitoring:4318"
