apiVersion: v1
kind: ConfigMap
metadata:
  name: shopee-oms-fulfillment-config
data:
  APP_NAME: "shopee-oms-fulfillment"
  APP_ENV: "production"
  LOG_LEVEL: "info"
  OMS_FULFILLMENT_HTTP_PORT: "8105"
  OMS_FULFILLMENT_GRPC_PORT: "9105"
  REDIS_ADDR: "redis-master.cache:6379"
  KAFKA_BROKERS: "kafka-headless.kafka:9092"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.monitoring:4318"
