apiVersion: v1
kind: Service
metadata:
  name: shopee-api-gateway
  labels:
    app: shopee-api-gateway
spec:
  type: ClusterIP
  ports:
    - port: 8109
      targetPort: http
      protocol: TCP
      name: http
    - port: 9109
      targetPort: grpc
      protocol: TCP
      name: grpc
  selector:
    app: shopee-api-gateway
