syntax = "proto3";

package notification.v1;

option go_package = "github.com/shopee-clone/shopee/platforms/notification/proto/notification/v1;notificationv1";

import "google/protobuf/timestamp.proto";

service NotificationService {
  rpc SendNotification(SendNotificationRequest) returns (SendNotificationResponse);
  rpc ListNotifications(ListNotificationsRequest) returns (ListNotificationsResponse);
  rpc MarkRead(MarkReadRequest) returns (MarkReadResponse);
  rpc DeleteNotification(DeleteNotificationRequest) returns (DeleteNotificationResponse);
  rpc GetUnreadCount(GetUnreadCountRequest) returns (GetUnreadCountResponse);

  rpc RegisterDevice(RegisterDeviceRequest) returns (RegisterDeviceResponse);
  rpc SendPush(SendPushRequest) returns (SendPushResponse);

  rpc SendEmail(SendEmailRequest) returns (SendEmailResponse);

  rpc SendSMS(SendSMSRequest) returns (SendSMSResponse);

  rpc GetPreferences(GetPreferencesRequest) returns (GetPreferencesResponse);
  rpc UpdatePreferences(UpdatePreferencesRequest) returns (UpdatePreferencesResponse);

  rpc CreateTemplate(CreateTemplateRequest) returns (CreateTemplateResponse);
  rpc ListTemplates(ListTemplatesRequest) returns (ListTemplatesResponse);
}

enum Channel {
  CHANNEL_UNSPECIFIED = 0;
  CHANNEL_PUSH = 1;
  CHANNEL_EMAIL = 2;
  CHANNEL_SMS = 3;
  CHANNEL_INAPP = 4;
}

enum NotificationType {
  NOTIFICATION_TYPE_UNSPECIFIED = 0;
  NOTIFICATION_TYPE_ORDER_CONFIRMATION = 1;
  NOTIFICATION_TYPE_SHIPMENT_UPDATE = 2;
  NOTIFICATION_TYPE_PAYMENT_RECEIPT = 3;
  NOTIFICATION_TYPE_PROMOTION = 4;
  NOTIFICATION_TYPE_PRICE_DROP = 5;
  NOTIFICATION_TYPE_BACK_IN_STOCK = 6;
  NOTIFICATION_TYPE_WELCOME = 7;
  NOTIFICATION_TYPE_RESET_PASSWORD = 8;
  NOTIFICATION_TYPE_VERIFICATION = 9;
  NOTIFICATION_TYPE_ADMIN_ALERT = 10;
}

message Notification {
  string id = 1;
  string user_id = 2;
  string type = 3;
  string channel = 4;
  string title = 5;
  string body = 6;
  map<string, string> data = 7;
  string status = 8;
  int32 priority = 9;
  google.protobuf.Timestamp read_at = 10;
  google.protobuf.Timestamp created_at = 11;
}

message SendNotificationRequest {
  string user_id = 1;
  string type = 2;
  string channel = 3;
  string title = 4;
  string body = 5;
  map<string, string> data = 6;
  int32 priority = 7;
}

message SendNotificationResponse {
  Notification notification = 1;
}

message ListNotificationsRequest {
  string user_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message ListNotificationsResponse {
  repeated Notification notifications = 1;
}

message MarkReadRequest {
  string id = 1;
}

message MarkReadResponse {
  bool success = 1;
}

message DeleteNotificationRequest {
  string id = 1;
}

message DeleteNotificationResponse {
  bool success = 1;
}

message GetUnreadCountRequest {
  string user_id = 1;
}

message GetUnreadCountResponse {
  int32 count = 1;
}

message RegisterDeviceRequest {
  string user_id = 1;
  string token = 2;
  string platform = 3;
}

message RegisterDeviceResponse {
  string device_id = 1;
  bool success = 2;
}

message SendPushRequest {
  string user_id = 1;
  string title = 2;
  string body = 3;
  map<string, string> data = 4;
}

message SendPushResponse {
  bool success = 1;
  string error = 2;
}

message SendEmailRequest {
  repeated string to = 1;
  string subject = 2;
  string html = 3;
  string plain_text = 4;
}

message SendEmailResponse {
  string email_id = 1;
  bool success = 2;
}

message SendSMSRequest {
  string to = 1;
  string body = 2;
}

message SendSMSResponse {
  string sms_id = 1;
  bool success = 2;
}

message GetPreferencesRequest {
  string user_id = 1;
}

message ChannelOptIn {
  bool push = 1;
  bool email = 2;
  bool sms = 3;
  bool inapp = 4;
}

message QuietHours {
  bool enabled = 1;
  string start = 2;
  string end = 3;
  string timezone = 4;
}

message UserPreference {
  string user_id = 1;
  ChannelOptIn channel_opt_in = 2;
  map<string, bool> categories = 3;
  QuietHours quiet_hours = 4;
  bool email_digest = 5;
  bool push_enabled = 6;
}

message GetPreferencesResponse {
  UserPreference preferences = 1;
}

message UpdatePreferencesRequest {
  string user_id = 1;
  ChannelOptIn channel_opt_in = 2;
  map<string, bool> categories = 3;
  QuietHours quiet_hours = 4;
  bool email_digest = 5;
  bool push_enabled = 6;
}

message UpdatePreferencesResponse {
  UserPreference preferences = 1;
}

message CreateTemplateRequest {
  string name = 1;
  string subject = 2;
  string body = 3;
  repeated string variables = 4;
}

message Template {
  string id = 1;
  string name = 2;
  string subject = 3;
  string body = 4;
  repeated string variables = 5;
  int32 version = 6;
  google.protobuf.Timestamp created_at = 7;
}

message CreateTemplateResponse {
  Template template = 1;
}

message ListTemplatesRequest {}

message ListTemplatesResponse {
  repeated Template templates = 1;
}
