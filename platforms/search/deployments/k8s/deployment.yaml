apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-service
  namespace: shopee
  labels:
    app: search-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: search-service
  template:
    metadata:
      labels:
        app: search-service
    spec:
      containers:
        - name: search
          image: shopee/search-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9090
              name: grpc
          env:
            - name: APP_NAME
              value: "shopee-search"
            - name: APP_ENV
              value: "production"
            - name: SEARCH_HTTP_PORT
              value: "8080"
            - name: SEARCH_GRPC_PORT
              value: "9090"
            - name: REDIS_ADDR
              valueFrom:
                configMapKeyRef:
                  name: shopee-config
                  key: redis.addr
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: shopee-config
                  key: kafka.brokers
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: shopee-config
                  key: otel.endpoint
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: search-service
  namespace: shopee
spec:
  selector:
    app: search-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: grpc
      port: 9090
      targetPort: 9090
  type: ClusterIP
