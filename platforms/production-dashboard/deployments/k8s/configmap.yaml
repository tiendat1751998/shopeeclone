apiVersion: v1
kind: ConfigMap
metadata:
  name: production-dashboard-config
  namespace: shopee-platform
  labels:
    app: production-dashboard
data:
  APP_ENV: "production"
  LOG_LEVEL: "info"
  DASHBOARD_HTTP_PORT: "8080"
  DASHBOARD_GRPC_PORT: "9090"
  MYSQL_MAX_OPEN_CONNS: "25"
  MYSQL_MAX_IDLE_CONNS: "10"
  REDIS_ADDR: "redis-cluster:6379"
  KAFKA_BROKERS: "kafka:9092"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
  SERVICES_POLL_INTERVAL: "30s"
  INCIDENT_RETENTION_DAYS: "90"
  METRICS_RETENTION_DAYS: "30"
  MAX_ALERT_RULES: "500"
