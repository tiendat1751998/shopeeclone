apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: production-dashboard
  namespace: shopee-platform
  labels:
    app: production-dashboard
spec:
  podSelector:
    matchLabels:
      app: production-dashboard
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: shopee-platform
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - port: 8080
          protocol: TCP
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: shopee-data
      ports:
        - port: 3306
          protocol: TCP
        - port: 6379
          protocol: TCP
        - port: 9092
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              name: shopee-platform
      ports:
        - port: 4318
          protocol: TCP
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
