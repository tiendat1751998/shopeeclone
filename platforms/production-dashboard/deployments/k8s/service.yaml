apiVersion: v1
kind: Service
metadata:
  name: production-dashboard
  namespace: shopee-platform
  labels:
    app: production-dashboard
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      name: http
      protocol: TCP
    - port: 9090
      targetPort: 9090
      name: grpc
      protocol: TCP
  selector:
    app: production-dashboard
