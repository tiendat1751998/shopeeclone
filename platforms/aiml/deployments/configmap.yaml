apiVersion: v1
kind: ConfigMap
metadata:
  name: shopee-aiml-config
data:
  APP_NAME: "shopee-aiml"
  APP_ENV: "production"
  LOG_LEVEL: "info"
  AIML_HTTP_PORT: "8110"
  AIML_GRPC_PORT: "9110"
  REDIS_ADDR: "redis-master.cache:6379"
  KAFKA_BROKERS: "kafka-headless.kafka:9092"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.monitoring:4318"
