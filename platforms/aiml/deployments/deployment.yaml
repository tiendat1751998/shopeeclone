apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopee-aiml
  labels:
    app: shopee-aiml
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shopee-aiml
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: shopee-aiml
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8110"
    spec:
      serviceAccountName: shopee-aiml
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: shopee-aiml
          image: shopee-clone/shopee-aiml:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8110
            - name: grpc
              containerPort: 9110
          envFrom:
            - configMapRef:
                name: shopee-aiml-config
            - secretRef:
                name: shopee-aiml-secrets
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 1
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
