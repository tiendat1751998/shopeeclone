apiVersion: v1
kind: ConfigMap
metadata:
  name: shopee-developer-config
data:
  APP_NAME: "shopee-developer"
  APP_ENV: "production"
  LOG_LEVEL: "info"
  DEVELOPER_HTTP_PORT: "8111"
  DEVELOPER_GRPC_PORT: "9111"
  REDIS_ADDR: "redis-master.cache:6379"
  KAFKA_BROKERS: "kafka-headless.kafka:9092"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.monitoring:4318"
