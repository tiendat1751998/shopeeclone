apiVersion: v1
kind: Service
metadata:
  name: shopee-sre
  labels:
    app: shopee-sre
spec:
  type: ClusterIP
  ports:
    - port: 8113
      targetPort: http
      protocol: TCP
      name: http
    - port: 9113
      targetPort: grpc
      protocol: TCP
      name: grpc
  selector:
    app: shopee-sre
