apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopee-sre
  labels:
    app: shopee-sre
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shopee-sre
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: shopee-sre
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8113"
    spec:
      serviceAccountName: shopee-sre
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: shopee-sre
          image: shopee-clone/shopee-sre:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8113
            - name: grpc
              containerPort: 9113
          envFrom:
            - configMapRef:
                name: shopee-sre-config
            - secretRef:
                name: shopee-sre-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
