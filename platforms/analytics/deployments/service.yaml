apiVersion: v1
kind: Service
metadata:
  name: shopee-analytics
  labels:
    app: shopee-analytics
spec:
  type: ClusterIP
  ports:
    - port: 8098
      targetPort: http
      protocol: TCP
      name: http
    - port: 9098
      targetPort: grpc
      protocol: TCP
      name: grpc
  selector:
    app: shopee-analytics
