apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: tiki-analytics
spec:
  podSelector:
    matchLabels:
      app: tiki-analytics
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: tiki-gateway
      ports:
        - protocol: TCP
          port: 8098
        - protocol: TCP
          port: 9098
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - podSelector:
            matchLabels:
              app: kafka
      ports:
        - protocol: TCP
          port: 9092
    - to:
        - podSelector:
            matchLabels:
              app: mysql
      ports:
        - protocol: TCP
          port: 3306
