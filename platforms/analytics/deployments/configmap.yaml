apiVersion: v1
kind: ConfigMap
metadata:
  name: tiki-analytics-config
data:
  APP_NAME: "tiki-analytics"
  APP_ENV: "production"
  LOG_LEVEL: "info"
  ANALYTICS_HTTP_PORT: "8098"
  ANALYTICS_GRPC_PORT: "9098"
  REDIS_ADDR: "redis-master.cache:6379"
  KAFKA_BROKERS: "kafka-headless.kafka:9092"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.monitoring:4318"
