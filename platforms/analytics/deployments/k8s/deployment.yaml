apiVersion: apps/v1
kind: Deployment
metadata:
  name: tiki-analytics
  labels:
    app: tiki-analytics
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tiki-analytics
  template:
    metadata:
      labels:
        app: tiki-analytics
    spec:
      containers:
      - name: analytics
        image: tiki-clone/tiki-analytics:latest
        ports:
        - containerPort: 8080
        - containerPort: 9090
        env:
        - name: APP_NAME
          value: "tiki-analytics"
        - name: APP_ENV
          value: "production"
        - name: ANALYTICS_HTTP_PORT
          value: "8080"
        - name: ANALYTICS_GRPC_PORT
          value: "9090"
        - name: REDIS_ADDR
          value: "redis:6379"
        - name: KAFKA_BROKERS
          value: "kafka:9092"
        - name: DATABASE_DSN
          valueFrom:
            secretKeyRef:
              name: analytics-db
              key: dsn
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector:4318"
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: tiki-analytics
  labels:
    app: tiki-analytics
spec:
  selector:
    app: tiki-analytics
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  - name: grpc
    port: 9090
    targetPort: 9090
  type: ClusterIP
