apiVersion: apps/v1
kind: Deployment
metadata:
  name: tiki-analytics
  labels:
    app: tiki-analytics
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: tiki-analytics
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: tiki-analytics
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8098"
    spec:
      serviceAccountName: tiki-analytics
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: tiki-analytics
          image: tiki-clone/tiki-analytics:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8098
            - name: grpc
              containerPort: 9098
          envFrom:
            - configMapRef:
                name: tiki-analytics-config
            - secretRef:
                name: tiki-analytics-secrets
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 1
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
