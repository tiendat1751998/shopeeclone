apiVersion: v1
kind: Service
metadata:
  name: shopee-fraud-risk
  labels:
    app: shopee-fraud-risk
spec:
  type: ClusterIP
  ports:
    - port: 8102
      targetPort: http
      protocol: TCP
      name: http
    - port: 9102
      targetPort: grpc
      protocol: TCP
      name: grpc
  selector:
    app: shopee-fraud-risk
