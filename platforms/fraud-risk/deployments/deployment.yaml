apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopee-fraud-risk
  labels:
    app: shopee-fraud-risk
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: shopee-fraud-risk
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: shopee-fraud-risk
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8102"
    spec:
      serviceAccountName: shopee-fraud-risk
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: shopee-fraud-risk
          image: shopee-clone/shopee-fraud-risk:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8102
            - name: grpc
              containerPort: 9102
          envFrom:
            - configMapRef:
                name: shopee-fraud-risk-config
            - secretRef:
                name: shopee-fraud-risk-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
