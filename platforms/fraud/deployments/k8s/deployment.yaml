apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopee-fraud
  namespace: shopee
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shopee-fraud
  template:
    metadata:
      labels:
        app: shopee-fraud
    spec:
      containers:
      - name: fraud
        image: shopee/fraud:latest
        ports:
        - containerPort: 8080
        - containerPort: 9090
        env:
        - name: APP_ENV
          value: "production"
        - name: HTTP_PORT
          value: "8080"
        - name: GRPC_PORT
          value: "9090"
        - name: DATABASE_DSN
          valueFrom:
            secretKeyRef:
              name: shopee-postgres
              key: fraud-dsn
        - name: REDIS_ADDR
          valueFrom:
            secretKeyRef:
              name: shopee-redis
              key: addr
        - name: KAFKA_BROKERS
          value: "kafka:9092"
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: shopee-fraud
  namespace: shopee
spec:
  selector:
    app: shopee-fraud
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  - name: grpc
    port: 9090
    targetPort: 9090
