syntax = "proto3";

package fraud.v1;

option go_package = "github.com/tikiclone/tiki/platforms/fraud/proto/fraud/v1;fraudv1";

service FraudDetectionService {
  rpc Evaluate(EvaluateRequest) returns (EvaluateResponse);
  rpc ListAlerts(ListAlertsRequest) returns (ListAlertsResponse);
  rpc ResolveAlert(ResolveAlertRequest) returns (ResolveAlertResponse);
  rpc CheckBlacklist(CheckBlacklistRequest) returns (CheckBlacklistResponse);
  rpc AddToBlacklist(AddToBlacklistRequest) returns (AddToBlacklistResponse);
  rpc CreateCase(CreateCaseRequest) returns (CreateCaseResponse);
  rpc InitiateVerification(InitiateVerificationRequest) returns (InitiateVerificationResponse);
  rpc VerifyCode(VerifyCodeRequest) returns (VerifyCodeResponse);
}

message EvaluateRequest {
  string type = 1;
  string user_id = 2;
  string ip = 3;
  string device_id = 4;
  double amount = 5;
  string currency = 6;
  map<string, string> metadata = 7;
}

message EvaluateResponse {
  double score = 1;
  string level = 2;
  double max_score = 3;
  bool alert_triggered = 4;
  string alert_id = 5;
  repeated RuleResult rule_results = 6;
}

message RuleResult {
  string rule_name = 1;
  int32 severity = 2;
  double weight = 3;
  double score = 4;
  bool triggered = 5;
  string reason = 6;
}

message ListAlertsRequest {
  string status = 1;
  string risk_level = 2;
  int32 offset = 3;
  int32 limit = 4;
}

message ListAlertsResponse {
  repeated FraudAlert alerts = 1;
  int32 total = 2;
}

message FraudAlert {
  string id = 1;
  string event_id = 2;
  string user_id = 3;
  string type = 4;
  double risk_score = 5;
  string risk_level = 6;
  string description = 7;
  string status = 8;
  string created_at = 9;
}

message ResolveAlertRequest {
  string id = 1;
  string resolved_by = 2;
  string resolution = 3;
}

message ResolveAlertResponse {
  string status = 1;
}

message CheckBlacklistRequest {
  string user_id = 1;
  string ip = 2;
  string device_id = 3;
  string card_number = 4;
}

message CheckBlacklistResponse {
  bool blocked = 1;
  repeated string reasons = 2;
}

message AddToBlacklistRequest {
  string type = 1;
  string value = 2;
  string reason = 3;
  int32 ttl_minutes = 4;
}

message AddToBlacklistResponse {
  string id = 1;
  string status = 2;
}

message CreateCaseRequest {
  string alert_id = 1;
  string user_id = 2;
  string title = 3;
  string description = 4;
  double risk_score = 5;
  string priority = 6;
}

message CreateCaseResponse {
  string id = 1;
  string status = 2;
}

message InitiateVerificationRequest {
  string user_id = 1;
  string method = 2;
  string target = 3;
}

message InitiateVerificationResponse {
  string verification_id = 1;
  string method = 2;
  string status = 3;
  string expires_at = 4;
}

message VerifyCodeRequest {
  string verification_id = 1;
  string code = 2;
}

message VerifyCodeResponse {
  string status = 1;
  bool verified = 2;
}
