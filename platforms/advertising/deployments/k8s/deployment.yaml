apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopee-advertising
  labels:
    app: shopee-advertising
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shopee-advertising
  template:
    metadata:
      labels:
        app: shopee-advertising
    spec:
      containers:
      - name: advertising
        image: shopee/advertising:latest
        ports:
        - containerPort: 8080
        - containerPort: 9090
        env:
        - name: APP_ENV
          value: "production"
        - name: ADV_HTTP_PORT
          value: "8080"
        - name: ADV_GRPC_PORT
          value: "9090"
        - name: REDIS_ADDR
          value: "redis:6379"
        - name: KAFKA_BROKERS
          value: "kafka:9092"
        - name: POSTGRES_DSN
          valueFrom:
            secretKeyRef:
              name: advertising-secrets
              key: postgres-dsn
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
