apiVersion: v1
kind: ConfigMap
metadata:
  name: shopee-search-indexing-config
data:
  APP_NAME: "shopee-search-indexing"
  APP_ENV: "production"
  LOG_LEVEL: "info"
  SEARCH_INDEXING_HTTP_PORT: "8100"
  SEARCH_INDEXING_GRPC_PORT: "9100"
  REDIS_ADDR: "redis-master.cache:6379"
  KAFKA_BROKERS: "kafka-headless.kafka:9092"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.monitoring:4318"
