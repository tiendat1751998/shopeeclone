apiVersion: v1
kind: Service
metadata:
  name: shopee-search-indexing
  labels:
    app: shopee-search-indexing
spec:
  type: ClusterIP
  ports:
    - port: 8100
      targetPort: http
      protocol: TCP
      name: http
    - port: 9100
      targetPort: grpc
      protocol: TCP
      name: grpc
  selector:
    app: shopee-search-indexing
