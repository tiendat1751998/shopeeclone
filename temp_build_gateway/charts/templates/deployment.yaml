apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "shopee-gateway.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "shopee-gateway.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  minReadySeconds: 15
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "shopee-gateway.labels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "shopee-gateway.labels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 60
      containers:
      - name: gateway
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 9090
          name: grpc
        env:
        - name: APP_ENV
          value: {{ .Values.env.APP_ENV }}
        - name: LOG_LEVEL
          value: {{ .Values.env.LOG_LEVEL }}
        - name: REDIS_ADDR
          valueFrom:
            configMapKeyRef:
              name: {{ include "shopee-gateway.fullname" . }}-config
              key: redis_addr
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: {{ include "shopee-gateway.fullname" . }}-config
              key: otel_endpoint
        - name: JWKS_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: {{ include "shopee-gateway.fullname" . }}-config
              key: jwks_endpoint
        {{- if .Values.secrets.redis_password }}
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "shopee-gateway.fullname" . }}-secrets
              key: redis_password
        {{- end }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
