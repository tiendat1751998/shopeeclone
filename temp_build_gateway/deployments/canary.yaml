# Canary deployment for shopee-gateway
# Apply with: kubectl apply -f canary.yaml
# Then gradually shift traffic: kubectl set image deployment/shopee-gateway-canary gateway=shopee/gateway:canary
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopee-gateway-canary
  namespace: shopee-platform
  labels:
    app: shopee-gateway
    tier: platform
    version: canary
    track: canary
spec:
  replicas: 1
  minReadySeconds: 30
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: shopee-gateway
      track: canary
  template:
    metadata:
      labels:
        app: shopee-gateway
        tier: platform
        version: canary
        track: canary
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 60
      containers:
      - name: gateway
        image: shopee/gateway:canary
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 9090
          name: grpc
        env:
        - name: APP_ENV
          value: "production"
        - name: LOG_LEVEL
          value: "debug"
        - name: GATEWAY_HTTP_PORT
          value: "8080"
        - name: REDIS_ADDR
          valueFrom:
            configMapKeyRef:
              name: shopee-gateway-config
              key: redis_addr
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: shopee-gateway-config
              key: otel_endpoint
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
---
# Canary Service (selects both stable + canary via label)
apiVersion: v1
kind: Service
metadata:
  name: shopee-gateway-canary
  namespace: shopee-platform
  labels:
    app: shopee-gateway
    track: canary
spec:
  selector:
    app: shopee-gateway
    track: canary
  ports:
  - port: 80
    targetPort: 8080
    name: http
---
# ServiceMonitor for canary
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: shopee-gateway-canary
  namespace: shopee-observability
  labels:
    app: shopee-gateway
    track: canary
spec:
  selector:
    matchLabels:
      app: shopee-gateway
      track: canary
  namespaceSelector:
    matchNames:
    - shopee-platform
  endpoints:
  - port: http
    path: /metrics
    interval: 15s
