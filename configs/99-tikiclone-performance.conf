# Tikiclone Performance Tuning for 10K+ TPS
# Apply with: sudo cp /home/datdt/tikiclone/configs/99-tikiclone-performance.conf /etc/sysctl.d/99-tikiclone-performance.conf && sudo sysctl --system

# TCP connection queues
net.core.somaxconn = 65536
net.ipv4.tcp_max_syn_backlog = 65536
net.core.netdev_max_backlog = 65536

# Port reuse and fast recycling
net.ipv4.tcp_tw_reuse = 1
net.ipv4.tcp_fin_timeout = 15

# Ephemeral port range (for outbound connections from containers)
net.ipv4.ip_local_port_range = 1024 65535

# Socket buffer sizes
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.core.optmem_max = 81920
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 87380 16777216

# TCP memory (pages)
net.ipv4.tcp_mem = 786432 1048576 1572864

# Connection tracking
net.nf_conntrack_max = 1048576

# Disable idle slow start
net.ipv4.tcp_slow_start_after_idle = 0

# TCP keepalive
net.ipv4.tcp_keepalive_time = 30
net.ipv4.tcp_keepalive_intvl = 5
net.ipv4.tcp_keepalive_probes = 3

# File descriptors
fs.file-max = 2097152
fs.nr_open = 2097152
