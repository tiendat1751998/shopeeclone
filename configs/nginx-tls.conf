# Nginx TLS + Performance Configuration for 10K+ TPS
# Optimized for high-throughput reverse proxy with upstream keepalive pooling

upstream gateway_backend {
    server tikiclone-gateway-1:8080;
    keepalive 256;
    keepalive_requests 100000;
    keepalive_timeout 300s;
}

upstream web_backend {
    server tikiclone-web-1:3000;
    keepalive 64;
    keepalive_requests 100000;
    keepalive_timeout 300s;
}

upstream delivery_backend {
    server tikiclone-shipment-1:8092;
    keepalive 64;
    keepalive_requests 100000;
    keepalive_timeout 300s;
}

server {
    listen 3000;
    server_name _;
    return 301 https://$host:8443$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:40m;
    ssl_session_timeout 60m;
    ssl_session_tickets on;
    ssl_prefer_server_ciphers on;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    resolver 127.0.0.11 valid=10s;

    # Performance tuning
    proxy_buffering on;
    proxy_buffer_size 8k;
    proxy_buffers 16 8k;
    tcp_nodelay on;
    tcp_nopush on;

    # Timeouts
    proxy_connect_timeout 2s;
    proxy_send_timeout 15s;
    proxy_read_timeout 30s;

    # WebSocket for delivery tracking
    location /ws {
        proxy_pass http://delivery_backend/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Delivery tracker API (direct to shipment service)
    location /api/v1/delivery/ {
        proxy_pass http://delivery_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Delivery orders API
    location /api/v1/orders {
        proxy_pass http://delivery_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API gateway (all other /api/ traffic)
    location /api/ {
        proxy_pass http://gateway_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 32 16k;
    }

    # Next.js frontend
    location / {
        proxy_pass http://web_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
