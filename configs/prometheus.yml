global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: tiki-clone
    namespace: tiki

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Core Go services - all 12 services with /metrics endpoint
  - job_name: "tiki-services"
    scrape_interval: 10s
    static_configs:
      - targets:
          - "gateway:8080"
          - "auth:8087"
          - "cart:8082"
          - "checkout:8085"
          - "catalog-product:8088"
          - "product:8089"
          - "product-catalog:8090"
          - "promotion:8091"
          - "order:8084"
          - "payment:8083"
          - "inventory:8086"
          - "shipment:8092"
        labels:
          team: core
