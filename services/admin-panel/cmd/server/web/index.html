<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopee Admin Panel</title>
<link rel="stylesheet" href="/styles/admin.css">
</head>
<body>
<div id="app">
  <!-- Login Screen -->
  <div id="login-screen" class="screen active">
    <div class="login-container">
      <div class="login-logo">
        <span class="logo-icon">S</span>
        <h1>Shopee Admin</h1>
      </div>
      <form id="login-form" class="login-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="admin@shopee.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Sign In</button>
        <div id="login-error" class="error-message" style="display:none"></div>
      </form>
    </div>
  </div>

  <!-- Main App -->
  <div id="main-app" class="screen">
    <!-- Sidebar -->
    <nav id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <span class="logo-icon">S</span>
        <span class="sidebar-title">Admin</span>
      </div>
      <div class="sidebar-search">
        <input type="text" id="nav-search" placeholder="Search...">
      </div>
      <ul class="nav-menu" id="nav-menu">
        <li class="nav-section">Overview</li>
        <li class="nav-item active" data-page="dashboard">
          <span class="nav-icon">📊</span> Dashboard
        </li>
        <li class="nav-section">Management</li>
        <li class="nav-item" data-page="users">
          <span class="nav-icon">👥</span> Users
        </li>
        <li class="nav-item" data-page="products">
          <span class="nav-icon">📦</span> Products
        </li>
        <li class="nav-item" data-page="orders">
          <span class="nav-icon">🛒</span> Orders
        </li>
        <li class="nav-item" data-page="inventory">
          <span class="nav-icon">🏪</span> Inventory
        </li>
        <li class="nav-item" data-page="promotions">
          <span class="nav-icon">🎟️</span> Promotions
        </li>
        <li class="nav-item" data-page="payments">
          <span class="nav-icon">💳</span> Payments
        </li>
        <li class="nav-item" data-page="shipments">
          <span class="nav-icon">🚚</span> Shipments
        </li>
        <li class="nav-section">Platform</li>
        <li class="nav-item" data-page="analytics">
          <span class="nav-icon">📈</span> Analytics
        </li>
        <li class="nav-item" data-page="content">
          <span class="nav-icon">📝</span> Content
        </li>
        <li class="nav-item" data-page="system">
          <span class="nav-icon">⚙️</span> System
        </li>
      </ul>
      <div class="sidebar-footer">
        <div class="user-info" id="user-info">
          <span class="user-avatar">A</span>
          <span class="user-name" id="user-name">Admin</span>
        </div>
        <button class="btn btn-sm btn-outline" id="logout-btn">Logout</button>
      </div>
    </nav>

    <!-- Content Area -->
    <main id="content-area" class="content-area">
      <header class="content-header">
        <button class="sidebar-toggle" id="sidebar-toggle">☰</button>
        <h2 id="page-title">Dashboard</h2>
        <div class="header-actions">
          <span class="live-indicator" id="connection-status">
            <span class="dot"></span> Live
          </span>
          <span id="clock" class="clock"></span>
        </div>
      </header>
      <div id="page-content" class="page-content">
        <!-- Dynamic content loaded here -->
      </div>
    </main>
  </div>
</div>

<!-- Modal Container -->
<div id="modal-overlay" class="modal-overlay" style="display:none">
  <div class="modal" id="modal-container">
    <div class="modal-header">
      <h3 id="modal-title">Modal</h3>
      <button class="modal-close" id="modal-close">&times;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<!-- Toast Container -->
<div id="toast-container" class="toast-container"></div>

<script src="/js/admin.js"></script>
</body>
</html>
