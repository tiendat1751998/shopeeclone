replicaCount: 3
image:
  repository: shopee-clone/shopee-inventory
  tag: latest
  pullPolicy: Always
service:
  type: ClusterIP
  httpPort: 80
  grpcPort: 9096
  targetHttpPort: 8086
  targetGrpcPort: 9096
resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilization: 70
  targetMemoryUtilization: 80
pdb:
  enabled: true
  minAvailable: "50%"
serviceMonitor:
  enabled: true
networkPolicy:
  enabled: true
config:
  appName: shopee-inventory
  appEnv: production
  mysql:
    host: shopee-mysql
    port: 3306
    database: shopee_inventory
  redis:
    addr: shopee-redis:6379
    db: 6
  kafka:
    brokers: "shopee-kafka:9092"
    topicPrefix: shopee.inventory
  inventory:
    reservationTTL: 30m
    reorderLevel: 10
secrets:
  mysql:
    user: shopee
    password: change-me-in-production
  jwt:
    accessSecret: change-me-in-production
