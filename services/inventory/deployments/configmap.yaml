apiVersion: v1
kind: ConfigMap
metadata:
  name: shopee-inventory-config
data:
  APP_NAME: "shopee-inventory"
  APP_ENV: "production"
  LOG_LEVEL: "warn"
  INVENTORY_HTTP_PORT: "8086"
  INVENTORY_GRPC_PORT: "9096"
  MYSQL_HOST: "shopee-mysql"
  MYSQL_PORT: "3306"
  MYSQL_DATABASE: "shopee_inventory"
  REDIS_ADDR: "shopee-redis:6379"
  REDIS_DB: "6"
  KAFKA_BROKERS: "shopee-kafka:9092"
  KAFKA_TOPIC_PREFIX: "shopee.inventory"
  KAFKA_CONSUMER_GROUP: "shopee-inventory-service"
  JWT_ISSUER: "shopee-auth"
  JWT_AUDIENCE: "shopee-clone"
  INVENTORY_RESERVATION_TTL: "30m"
  INVENTORY_REORDER_LEVEL: "10"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
  OTEL_SERVICE_NAME: "shopee-inventory"
