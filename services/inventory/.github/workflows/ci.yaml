name: Inventory CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.24"
  APP_NAME: shopee-inventory

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/inventory
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: services/inventory

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/inventory
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run tests
        run: go test -v -race -count=1 ./...

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: services/inventory
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build binary
        run: CGO_ENABLED=0 go build -ldflags="-w -s" -o bin/${{ env.APP_NAME }} ./cmd/server

  docker:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: services/inventory
          push: true
          tags: |
            ghcr.io/shopee-clone/inventory:${{ github.sha }}
            ghcr.io/shopee-clone/inventory:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - name: Install Helm
        uses: azure/setup-helm@v4
      - name: Validate Helm chart
        run: helm lint services/inventory/charts
      - name: Render templates
        run: helm template ${{ env.APP_NAME }} services/inventory/charts