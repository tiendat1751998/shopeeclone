app:
  name: tiki-auth
  env: development
  log_level: debug

server:
  http_port: 8080
  grpc_port: 9090

mysql:
  host: localhost
  port: 3306
  user: shopee
  password: tiki_dev
  database: tiki_auth
  max_open_conns: 25
  max_idle_conns: 10
  max_lifetime: 5m
  timeout: 5s

redis:
  addr: localhost:6379
  password: ""
  db: 0
  pool_size: 100
  min_idle: 20

jwt:
  access_ttl: 15m
  refresh_ttl: 168h
  issuer: tiki-auth
  audience: tiki-clone
  rotation_enabled: true
  blacklist_enabled: true

password:
  algorithm: bcrypt
  bcrypt_cost: 12

rate_limit:
  login_max_attempts: 5
  login_window: 5m
  account_lockout: 10
  lockout_duration: 30m

session:
  max_sessions_per_user: 10
  session_ttl: 24h
  refresh_rotation: true

audit:
  enabled: true
  flush_interval: 5s
  batch_size: 100
