apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopee-auth
  namespace: shopee-services
  labels:
    app: shopee-auth
    tier: services
spec:
  replicas: 3
  minReadySeconds: 15
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: shopee-auth
  template:
    metadata:
      labels:
        app: shopee-auth
        tier: services
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 60
      containers:
      - name: auth
        image: shopee/auth:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 9090
          name: grpc
        env:
        - name: APP_ENV
          value: "production"
        - name: MYSQL_HOST
          valueFrom:
            configMapKeyRef:
              name: shopee-auth-config
              key: mysql_host
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: shopee-auth-secrets
              key: mysql_password
        - name: REDIS_ADDR
          valueFrom:
            configMapKeyRef:
              name: shopee-auth-config
              key: redis_addr
        - name: JWT_ACCESS_SECRET
          valueFrom:
            secretKeyRef:
              name: shopee-auth-secrets
              key: jwt_access_secret
        - name: JWT_REFRESH_SECRET
          valueFrom:
            secretKeyRef:
              name: shopee-auth-secrets
              key: jwt_refresh_secret
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
