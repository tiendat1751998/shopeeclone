apiVersion: v1
kind: Service
metadata:
  name: shopee-auth
  namespace: shopee-services
  labels:
    app: shopee-auth
    tier: services
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
    name: http
    protocol: TCP
  - port: 9090
    targetPort: 9090
    name: grpc
    protocol: TCP
  selector:
    app: shopee-auth
