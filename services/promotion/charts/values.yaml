replicaCount: 3
image:
  repository: shopee/promotion
  tag: latest
  pullPolicy: IfNotPresent
service:
  type: ClusterIP
  httpPort: 8080
  grpcPort: 9090
resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "500m"
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 15
  targetCPUUtilization: 70
  targetMemoryUtilization: 80
pdb:
  enabled: true
  minAvailable: 2
env:
  APP_NAME: "shopee-promotion"
  APP_ENV: "production"
  LOG_LEVEL: "info"
  MYSQL_DATABASE: "shopee_promotion"
secrets:
  mysqlHost: "mysql-primary.database"
  mysqlUser: "shopee"
  mysqlPassword: "change-me-in-production"
  redisAddr: "redis-master.cache:6379"
kafka:
  brokers: "kafka-headless.kafka:9092"
otel:
  endpoint: "http://otel-collector.monitoring:4318"
