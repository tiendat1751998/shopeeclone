apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopee-shipment
  labels:
    app: shopee-shipment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: shopee-shipment
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: shopee-shipment
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8085"
    spec:
      serviceAccountName: shopee-shipment
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: shopee-shipment
          image: shopee-clone/shopee-shipment:latest
          ports:
            - name: http
              containerPort: 8085
            - name: grpc
              containerPort: 9095
          envFrom:
            - configMapRef:
                name: shopee-shipment-config
            - secretRef:
                name: shopee-shipment-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
      terminationGracePeriodSeconds: 60
