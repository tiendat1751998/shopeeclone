apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "shopee-shipment.fullname" . }}
  labels: {{- include "shopee-shipment.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "shopee-shipment.name" . }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: {{ include "shopee-shipment.name" . }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.service.targetHttpPort }}"
    spec:
      serviceAccountName: {{ include "shopee-shipment.fullname" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - name: http
              containerPort: {{ .Values.service.targetHttpPort }}
            - name: grpc
              containerPort: {{ .Values.service.targetGrpcPort }}
          envFrom:
            - configMapRef:
                name: {{ include "shopee-shipment.fullname" . }}-config
            - secretRef:
                name: {{ include "shopee-shipment.fullname" . }}-secrets
          resources: {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
      terminationGracePeriodSeconds: 60
