name: CI/CD Pipeline
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
env:
  GO_VERSION: "1.22"
  APP_NAME: shopee-shipment
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5:
          go-version: ${{ env.GO_VERSION }}
      - uses: golangci/golangci-lint-action@v4:
          version: latest
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5:
          go-version: ${{ env.GO_VERSION }}
      - run: go test -v -race ./...
  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5:
          go-version: ${{ env.GO_VERSION }}
      - run: CGO_ENABLED=0 go build -ldflags="-w -s" -o bin/${{ env.APP_NAME }} ./cmd/server
  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm lint ./charts
      - run: helm template ${{ env.APP_NAME }} ./charts
