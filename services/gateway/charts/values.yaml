replicaCount: 3

image:
  repository: shopee/gateway
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 8080
  grpcPort: 9090
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60s"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60s"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: api.shopee-clone.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: shopee-gateway-tls
      hosts:
        - api.shopee-clone.com

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 2

env:
  APP_ENV: production
  LOG_LEVEL: info

configMap:
  redis_addr: redis-cluster.shopee-data:6379
  otel_endpoint: http://otel-collector.shopee-observability:4318
  jwks_endpoint: http://identity-auth.shopee-services:8080/.well-known/jwks.json

secrets:
  redis_password: ""

networkPolicy:
  enabled: true

serviceMonitor:
  enabled: true
  namespace: shopee-observability
  interval: 15s
