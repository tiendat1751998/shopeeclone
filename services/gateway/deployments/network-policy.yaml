apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: shopee-gateway
  namespace: shopee-platform
spec:
  podSelector:
    matchLabels:
      app: shopee-gateway
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - port: 8080
          protocol: TCP
    - from:
        - podSelector:
            matchLabels:
              tier: platform
      ports:
        - port: 8080
          protocol: TCP
        - port: 9090
          protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              name: shopee-observability
      ports:
        - port: 8080
          protocol: TCP
  egress:
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - to:
        - ipBlock:
            cidr: 10.0.0.0/8
      ports:
        - port: 6379
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              name: shopee-services
      ports:
        - port: 8080
          protocol: TCP
        - port: 9090
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              name: shopee-observability
      ports:
        - port: 4318
          protocol: TCP
        - port: 4317
          protocol: TCP
