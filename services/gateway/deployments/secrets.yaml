apiVersion: v1
kind: Secret
metadata:
  name: shopee-gateway-secrets
  namespace: shopee-platform
  labels:
    app: shopee-gateway
type: Opaque
stringData:
  redis_password: ""
  jwt_access_secret: ""
  jwt_refresh_secret: ""
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: shopee-gateway
  namespace: shopee-platform
  labels:
    app: shopee-gateway
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: shopee-gateway
rules:
- apiGroups: [""]
  resources: ["services", "endpoints", "pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: shopee-gateway
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: shopee-gateway
subjects:
- kind: ServiceAccount
  name: shopee-gateway
  namespace: shopee-platform
