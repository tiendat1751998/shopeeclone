apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopee-gateway
  namespace: shopee-platform
  labels:
    app: shopee-gateway
    tier: platform
    version: v1
spec:
  replicas: 3
  minReadySeconds: 15
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: shopee-gateway
  template:
    metadata:
      labels:
        app: shopee-gateway
        tier: platform
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: shopee-gateway
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - shopee-gateway
              topologyKey: kubernetes.io/hostname
      containers:
      - name: gateway
        image: shopee/gateway:latest
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        - containerPort: 9090
          name: grpc
          protocol: TCP
        env:
        - name: APP_ENV
          value: "production"
        - name: APP_NAME
          value: "shopee-gateway"
        - name: LOG_LEVEL
          value: "info"
        - name: GATEWAY_HTTP_PORT
          value: "8080"
        - name: GATEWAY_GRPC_PORT
          value: "9090"
        - name: REDIS_ADDR
          valueFrom:
            configMapKeyRef:
              name: shopee-gateway-config
              key: redis_addr
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: shopee-gateway-secrets
              key: redis_password
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: shopee-gateway-config
              key: otel_endpoint
        - name: JWKS_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: shopee-gateway-config
              key: jwks_endpoint
        - name: RATE_LIMIT_ENABLED
          value: "true"
        - name: RBAC_ENABLED
          value: "true"
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: "2"
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 2
        startupProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
          failureThreshold: 12
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
