apiVersion: v1
kind: ConfigMap
metadata:
  name: shopee-payment-config
data:
  APP_NAME: "shopee-payment"
  APP_ENV: "production"
  LOG_LEVEL: "warn"
  PAYMENT_HTTP_PORT: "8084"
  PAYMENT_GRPC_PORT: "9094"
  MYSQL_HOST: "shopee-mysql"
  MYSQL_PORT: "3306"
  MYSQL_DATABASE: "shopee_payments"
  REDIS_ADDR: "shopee-redis:6379"
  REDIS_DB: "4"
  KAFKA_BROKERS: "shopee-kafka:9092"
  KAFKA_TOPIC_PREFIX: "shopee.payments"
  KAFKA_CONSUMER_GROUP: "shopee-payment-service"
  DEFAULT_PSP: "stripe"
  JWT_ISSUER: "shopee-auth"
  JWT_AUDIENCE: "shopee-clone"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
  OTEL_SERVICE_NAME: "shopee-payment"
