{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "shopee-payment.fullname" . }}
spec:
  selector:
    matchLabels:
      app: {{ include "shopee-payment.name" . }}
  endpoints:
    - port: http
      interval: 15s
{{- end }}
