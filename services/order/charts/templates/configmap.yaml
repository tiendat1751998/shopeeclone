apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "shopee-order.fullname" . }}-config
data:
  APP_NAME: "{{ .Values.config.appName }}"
  APP_ENV: "{{ .Values.config.appEnv }}"
  LOG_LEVEL: "{{ .Values.config.logLevel }}"
  ORDER_HTTP_PORT: "{{ .Values.service.targetHttpPort }}"
  ORDER_GRPC_PORT: "{{ .Values.service.targetGrpcPort }}"
  MYSQL_HOST: "{{ .Values.config.mysql.host }}"
  MYSQL_PORT: "{{ .Values.config.mysql.port }}"
  MYSQL_DATABASE: "{{ .Values.config.mysql.database }}"
  REDIS_ADDR: "{{ .Values.config.redis.addr }}"
  REDIS_DB: "{{ .Values.config.redis.db }}"
  KAFKA_BROKERS: "{{ .Values.config.kafka.brokers }}"
  KAFKA_TOPIC_PREFIX: "{{ .Values.config.kafka.topicPrefix }}"
  KAFKA_CONSUMER_GROUP: "{{ .Values.config.kafka.consumerGroup }}"
  ORDER_DEFAULT_CURRENCY: "{{ .Values.config.order.defaultCurrency }}"
  ORDER_PAYMENT_TIMEOUT: "{{ .Values.config.order.paymentTimeout }}"
  ORDER_IDEMPOTENCY_TTL: "{{ .Values.config.order.idempotencyTTL }}"
  OTEL_SERVICE_NAME: "{{ .Values.config.appName }}"
  AUDIT_ENABLED: "true"
