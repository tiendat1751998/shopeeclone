syntax = "proto3";

package shopee.order.v1;

option go_package = "github.com/shopee-clone/shopee/services/order/proto/order/v1";

service OrderService {
  rpc CreateOrder(CreateOrderRequest) returns (OrderResponse);
  rpc GetOrder(GetOrderRequest) returns (OrderResponse);
  rpc ListOrders(ListOrdersRequest) returns (ListOrdersResponse);
  rpc CancelOrder(CancelOrderRequest) returns (OrderResponse);
  rpc UpdateOrderStatus(UpdateStatusRequest) returns (OrderResponse);
  rpc GetOrderHistory(GetOrderHistoryRequest) returns (OrderHistoryResponse);
}

message CreateOrderRequest {
  string user_id = 1;
  string seller_id = 2;
  string currency = 3;
  string idempotency_key = 4;
  Address shipping_address = 5;
  Address billing_address = 6;
  repeated OrderItemInput items = 7;
  string metadata = 8;
}

message OrderItemInput {
  string product_id = 1;
  string sku_id = 2;
  string shop_id = 3;
  string name = 4;
  int32 quantity = 5;
  int64 unit_price = 6;
  string image_url = 7;
}

message Address {
  string street1 = 1;
  string street2 = 2;
  string city = 3;
  string state = 4;
  string postal_code = 5;
  string country = 6;
  string phone = 7;
}

message GetOrderRequest {
  string order_id = 1;
}

message ListOrdersRequest {
  string user_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message CancelOrderRequest {
  string order_id = 1;
  string reason = 2;
  string cancelled_by = 3;
}

message UpdateStatusRequest {
  string order_id = 1;
  string status = 2;
  string actor_id = 3;
  string actor_type = 4;
  string reason = 5;
}

message GetOrderHistoryRequest {
  string order_id = 1;
}

message OrderResponse {
  string id = 1;
  string order_number = 2;
  string user_id = 3;
  string seller_id = 4;
  string status = 5;
  int64 total_amount = 6;
  string currency = 7;
  Address shipping_address = 8;
  repeated OrderItem items = 9;
  int32 version = 10;
  string created_at = 11;
  string updated_at = 12;
}

message OrderItem {
  string id = 1;
  string product_id = 2;
  string sku_id = 3;
  string shop_id = 4;
  int32 quantity = 5;
  int64 unit_price = 6;
  int64 total_price = 7;
}

message ListOrdersResponse {
  repeated OrderResponse orders = 1;
  int32 total = 2;
  int32 page = 3;
}

message OrderHistoryResponse {
  string order_id = 1;
  repeated LifecycleEvent events = 2;
}

message LifecycleEvent {
  string id = 1;
  string from_status = 2;
  string to_status = 3;
  string transition_reason = 4;
  string actor_id = 5;
  string actor_type = 6;
  string created_at = 7;
}
