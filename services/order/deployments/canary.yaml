apiVersion: flagger.app/v1beta1
kind: Canary
metadata:
  name: shopee-order
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: shopee-order
  service:
    port: 80
    targetPort: 8083
    gateways:
      - istio-gateway
    hosts:
      - order.shopee-clone.local
  analysis:
    interval: 30s
    threshold: 5
    maxWeight: 50
    stepWeight: 10
    metrics:
      - name: request-success-rate
        thresholdRange:
          min: 99
        interval: 1m
      - name: request-duration
        thresholdRange:
          max: 500
        interval: 1m
    webhooks:
      - name: load-test
        url: http://flagger-loadtester.test/
        timeout: 5s
        metadata:
          cmd: "hey -z 1m -q 10 -c 2 http://order.shopee-clone.local/api/v1/orders"
