app:
  name: shopee-order
  env: development
  log_level: info
  http_port: 8083
  grpc_port: 9093

mysql:
  host: localhost
  port: 3306
  user: shopee
  password: shopee_dev
  database: shopee_orders
  max_open_conns: 25
  max_idle_conns: 10
  max_lifetime: 5m
  timeout: 5s

redis:
  addr: localhost:6379
  password: ""
  db: 3
  pool_size: 100
  min_idle: 20
  dial_timeout: 5s
  read_timeout: 3s
  write_timeout: 3s
  max_retries: 3

kafka:
  brokers:
    - localhost:9092
  topic_prefix: shopee.orders
  consumer_group: shopee-order-service
  dlq_topic: shopee.orders.dlq

jwt:
  access_secret: change-me-in-production
  access_ttl: 15m
  issuer: shopee-auth
  audience: shopee-clone

order:
  default_currency: SGD
  payment_timeout: 30m
  idempotency_ttl: 24h
  snapshot_retention_days: 365
  reconciliation_interval: 5m
  max_cancel_retry: 3

otel:
  endpoint: http://localhost:4318
  service_name: shopee-order
  trace_ratio: 0.1

audit:
  enabled: true
  flush_interval: 5s
  batch_size: 100
