apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopee-product-catalog
  labels: {app: shopee-product-catalog, version: v1}
spec:
  replicas: 3
  selector: {matchLabels: {app: shopee-product-catalog}}
  strategy: {type: RollingUpdate, rollingUpdate: {maxSurge: 1, maxUnavailable: 0}}
  template:
    metadata:
      labels: {app: shopee-product-catalog, version: v1}
      annotations: {prometheus.io/scrape: "true", prometheus.io/port: "8080", prometheus.io/path: "/metrics"}
    spec:
      containers:
        - name: catalog
          image: shopee/product-catalog:latest
          ports: [{containerPort: 8080, name: http}, {containerPort: 9090, name: grpc}]
          env:
            - {name: APP_NAME, value: "shopee-product-catalog"}
            - {name: APP_ENV, value: "production"}
            - {name: LOG_LEVEL, value: "info"}
            - {name: CATALOG_HTTP_PORT, value: "8080"}
            - name: MYSQL_HOST
              valueFrom: {secretKeyRef: {name: catalog-secrets, key: mysql-host}}
            - name: MYSQL_USER
              valueFrom: {secretKeyRef: {name: catalog-secrets, key: mysql-user}}
            - name: MYSQL_PASSWORD
              valueFrom: {secretKeyRef: {name: catalog-secrets, key: mysql-password}}
            - {name: MYSQL_DATABASE, value: "shopee_catalog"}
            - name: REDIS_ADDR
              valueFrom: {secretKeyRef: {name: catalog-secrets, key: redis-addr}}
            - name: KAFKA_BROKERS
              valueFrom: {configMapKeyRef: {name: catalog-config, key: kafka-brokers}}
            - {name: OTEL_EXPORTER_OTLP_ENDPOINT, value: "http://otel-collector.monitoring:4318"}
          resources: {requests: {memory: "256Mi", cpu: "250m"}, limits: {memory: "512Mi", cpu: "500m"}}
          livenessProbe: {httpGet: {path: /health, port: 8080}, initialDelaySeconds: 10, periodSeconds: 15, timeoutSeconds: 5, failureThreshold: 3}
          readinessProbe: {httpGet: {path: /ready, port: 8080}, initialDelaySeconds: 5, periodSeconds: 10, timeoutSeconds: 3, failureThreshold: 3}
      terminationGracePeriodSeconds: 30
