apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: shopee-product-catalog}
spec:
  podSelector: {matchLabels: {app: shopee-product-catalog}}
  policyTypes: [Ingress, Egress]
  ingress:
    - from: [{podSelector: {matchLabels: {app: shopee-gateway}}}, {podSelector: {matchLabels: {app: shopee-search}}}]
      ports: [{protocol: TCP, port: 8080}, {protocol: TCP, port: 9090}]
  egress:
    - to: [{podSelector: {matchLabels: {app: mysql}}}] ports: [{protocol: TCP, port: 3306}]
    - to: [{podSelector: {matchLabels: {app: redis}}}] ports: [{protocol: TCP, port: 6379}]
    - to: [{podSelector: {matchLabels: {app: kafka}}}] ports: [{protocol: TCP, port: 9092}]
