app:
  name: tiki-catalog
  env: production
  log_level: warn
  http_port: 8087
  grpc_port: 9097
mysql:
  host: ${MYSQL_HOST}
  port: ${MYSQL_PORT}
  user: ${MYSQL_USER}
  password: ${MYSQL_PASSWORD}
  database: ${MYSQL_DATABASE}
redis:
  addr: ${REDIS_ADDR}
  password: ${REDIS_PASSWORD}
  db: 7
kafka:
  brokers: ${KAFKA_BROKERS}
  topic_prefix: tiki.catalog
  consumer_group: tiki-catalog-service
jwt:
  access_secret: ${JWT_ACCESS_SECRET}
  access_ttl: 15m
catalog:
  max_page_size: 100
  cache_ttl: 5m
otel:
  endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT}
  service_name: tiki-catalog
