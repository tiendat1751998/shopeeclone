replicaCount: 3

image:
  repository: shopee/auth
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 8080
  grpcPort: 9090

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 2

env:
  APP_ENV: production
  LOG_LEVEL: info

configMap:
  mysql_host: mysql-cluster.shopee-data:3306
  redis_addr: redis-cluster.shopee-data:6379

secrets:
  mysql_password: ""
  jwt_access_secret: ""
  jwt_refresh_secret: ""

networkPolicy:
  enabled: true

serviceMonitor:
  enabled: true
  namespace: shopee-observability
  interval: 15s
