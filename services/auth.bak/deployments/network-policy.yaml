apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: shopee-auth-network-policy
  namespace: shopee-services
spec:
  podSelector:
    matchLabels:
      app: shopee-auth
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          tier: platform
    - namespaceSelector:
        matchLabels:
          tier: infrastructure
    ports:
    - protocol: TCP
      port: 8080
    - protocol: TCP
      port: 9090
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          tier: data
    ports:
    - protocol: TCP
      port: 3306
    - protocol: TCP
      port: 6379
