name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}

jobs:
  lint-go:
    name: Lint Go Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - auth
          - cart
          - catalog-product
          - checkout
          - gateway
          - inventory
          - order
          - payment
          - product
          - product-catalog
          - promotion
          - shipment
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: services/${{ matrix.service }}

  test-go:
    name: Test Go Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - auth
          - cart
          - catalog-product
          - checkout
          - inventory
          - order
          - payment
          - product
          - product-catalog
          - promotion
          - shipment
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: go test ./... -v -race -count=1 -coverprofile=coverage.out
      - name: Check coverage
        working-directory: services/${{ matrix.service }}
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "Coverage $COVERAGE% is below 80% threshold"
            exit 1
          fi

  lint-java:
    name: Lint Java Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - identity-auth
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven
      - name: Checkstyle
        working-directory: services/${{ matrix.service }}
        run: mvn checkstyle:check

  test-java:
    name: Test Java Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - identity-auth
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven
      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: mvn verify -Pcoverage
      - name: Check coverage
        working-directory: services/${{ matrix.service }}
        run: |
          COVERAGE=$(mvn jacoco:report -q 2>&1 | grep -oP 'Total.*?\K[0-9.]+(?=%)' || echo "0")
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "Coverage $COVERAGE% is below 80% threshold"
            exit 1
          fi

  docker-build:
    name: Build & Push Docker Images
    needs: [lint-go, test-go, lint-java, test-java]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service:
          - auth
          - cart
          - catalog-product
          - checkout
          - gateway
          - identity-auth
          - inventory
          - order
          - payment
          - product
          - product-catalog
          - promotion
          - shipment
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: ${{ env.REGISTRY }}/shopee-clone/${{ matrix.service }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max