name: Deploy
on:
  push:
    branches: [main]
    paths:
      - "services/**"
      - "platforms/**"
      - "deploy/**"

jobs:
  deploy-services:
    name: Deploy Services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE }}
          aws-region: ap-southeast-1
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name tiki-production --region ap-southeast-1
      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f deploy/platform/kubernetes/namespaces/
          kubectl apply -f deploy/platform/kubernetes/rbac/
          kubectl apply -f deploy/platform/kubernetes/resource-management/
          kubectl apply -f deploy/platform/kubernetes/network-policies/
      - name: Deploy Helm Charts
        run: |
          for chart in services/*/charts; do
            if [ -d "$chart" ]; then
              name=$(basename $(dirname $chart))
              helm upgrade --install $name $chart --namespace shopee --wait --timeout 5m
            fi
          done

  deploy-infra:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Terraform Init
        run: terraform init
        working-directory: deploy/infrastructure/terraform/environments/production
      - name: Terraform Plan
        run: terraform plan -out=tfplan
        working-directory: deploy/infrastructure/terraform/environments/production
      - name: Terraform Apply
        run: terraform apply tfplan
        working-directory: deploy/infrastructure/terraform/environments/production

  security-scan-deploy:
    name: Container Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan Docker images
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          scan-ref: ghcr.io/tiki-clone/*
          format: sarif
          output: trivy-image-results.sarif
      - name: Upload results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-results.sarif
